<script type="text/javascript">
  function saludarSegunHora() {
    const ahora = new Date();
    const hora = ahora.getHours();
    let mensaje = "";

    // Determinamos el saludo según el rango horario
    if (hora >= 6 && hora < 12) {
        mensaje = "¡Buenos días!";
    } else if (hora >= 12 && hora < 20) {
        mensaje = "¡Buenas tardes!";
    } else {
        mensaje = "¡Buenas noches!";
    }

    // Configuración de la API de Síntesis de Voz
    const saludoAudio = new SpeechSynthesisUtterance(mensaje);
    saludoAudio.lang = 'es-ES'; // Configura el idioma a español
    saludoAudio.rate = 1;       // Velocidad normal

    // Ejecutar el saludo
    window.speechSynthesis.speak(saludoAudio);
}
// 1. Cargar datos al iniciar
window.addEventListener('DOMContentLoaded', () => {
    saludarSegunHora()
    Change_version()
});

function Change_version(){

        const version = document.getElementById('version');
        api.send('app_version');
        api.receive('app_version', (event, arg) => {
                version.title = arg.name +" "+ arg.version;
                version.innerHTML = arg.name +" "+ arg.version;
        });
}

document.addEventListener('keydown', (e) => {
    // Verificamos las tres teclas simultáneamente
    if (e.ctrlKey && e.altKey && e.key.toLowerCase() === 'd') {
        e.preventDefault(); // Evita conflictos con el navegador
        
        //console.log("Comando Ctrl + Alt + D activado");
        // Aquí ejecutas tu función, por ejemplo:
        api.send("Repair-app-system")
    }
});
</script>
