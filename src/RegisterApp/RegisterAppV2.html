<!DOCTYPE html>
<html>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="../../assets/iconos/icomoon/style.css">

<style>

 
   
        /* --- LIGHTBOX --- */
        #lightbox {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            display: none;
            justify-content: center; align-items: center;
            backdrop-filter: blur(4px);
        }
        #lightbox img { max-width: 85%; max-height: 85%; border-radius: 8px; border: 4px solid white; }

        /* --- CONTENEDOR PRINCIPAL --- */
        .app-container {
            width: 100%; height: 100%;
            background: white;
            display: flex; flex-direction: column;
        }

        header {
            height: 55px;
            background: white;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            -webkit-app-region: drag;
        }
        header h2 { font-size: 1.1rem; color: var(--text-main); font-weight: 700; }

        /* --- LAYOUT --- */
        .content-grid {
            flex: 1;
            display: grid;
            grid-template-columns: 240px 1fr 240px;
            background: #fff;
        }

      .panel {
    padding: 5px;
}
        /* PANEL 1: AVATAR INTEGRADO (ESTILO INSTRUCTOR) */
        .media-panel { 
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            border-right: 1px solid var(--border); 
        }

        .avatar-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin-top: 10px;
        }

.avatar-frame {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 4px solid white;
    box-shadow: 0 0 0 2px var(--primary), 0 8px 20px rgba(0,0,0,0.1);
    overflow: hidden;
    background: #2196f3;
    cursor: zoom-in;
}
        .avatar-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .avatar-frame:hover img { transform: scale(1.05); }

        /* Botón unido al elemento */
        .camera-trigger {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 42px;
            height: 42px;
            background: var(--primary);
            color: white;
            border: 4px solid white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.2s;
            z-index: 5;
        }

        .camera-trigger:hover {
            background: var(--primary-dark);
            transform: scale(1.1);
        }

        .doc-preview {
            width: 100%; height: 110px;
            background: var(--bg-main);
            border: 2px dashed var(--border);
            border-radius: 12px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.3s;
        }
        .doc-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; display: none; }

        /* PANEL 2: FORMULARIO */
        .form-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; overflow-y: auto; }
        .full { grid-column: span 2; }
        
.form-group {
    background: #f9f9f9;
    padding: 6px;
    display: flex;
    justify-content: center;
    flex-direction: column;
}

.form-group label {
    display: block;
    font-size: 13px;
    font-weight: 800;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 4px;
}

.form-group>input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border-color);
    border-radius: 12px;
    font-size: 0.95rem;
    outline: none;
    transition: border 0.2s;
    background-color: white;
}
        input:focus { border-color: var(--primary); outline: none; background: #fff; box-shadow: 0 0 0 3px rgba(43, 86, 197, 0.1); }

        /* PANEL 3: SEGURIDAD */
        .security-panel { background: #fcfcfc; border-left: 1px solid var(--border); }
        .pass-box {
            background: white; padding: 12px; border-radius: 10px; border: 1.5px solid var(--border);
            margin-bottom: 15px;
        }
        .input-icon { display: flex; align-items: center; gap: 8px; }
        .input-icon input { border: none; padding: 5px; background: transparent; flex: 1; }
        .icon-eye { cursor: pointer; color: var(--text-muted); }

        /* FOOTER */
        footer {
            height: 65px;
            padding: 0 25px;
            border-top: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }

        .btn { padding: 10px 22px; border-radius: 8px; font-weight: 700; cursor: pointer; border: none; font-size: 0.8rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-sec { background: transparent; color: var(--text-muted); border: 1.5px solid var(--border); }

        #notif {
            position: fixed; top: 20px; right: -300px;
            background: var(--success); color: white; padding: 12px 20px;
            border-radius: 8px; transition: 0.5s; z-index: 3000;
        }
</style>

<script type="text/javascript">

setTimeout(()=>{

	document.getElementById("window-detail-install-app").classList.replace("container-hide","container-show-detail")

},5000)


/*----------------------CONTROL DEL SLIDECHOW------------------------------------*/
let slideIndex = 0;
showSlides();

function showSlides() {
  let i;
  let slides = document.getElementsByClassName("mySlides");
  let dots = document.getElementsByClassName("dot");
  
  // Ocultar todas las imágenes
  for (i = 0; i < slides.length; i++) {
    slides[i].style.display = "none";  
  }
  
  slideIndex++;
  
  // Reiniciar el índice si llega al final
  if (slideIndex > slides.length) {slideIndex = 1}    
  
  // Quitar la clase "active" de todos los puntos

  for (i = 0; i < dots.length; i++) {
    dots[i].className = dots[i].className.replace(" active", "");
  }
  
  // Mostrar la imagen actual y activar el punto correspondiente
  slides[slideIndex-1].style.display = "block";  
  dots[slideIndex-1].className += " active";
  
  // Ejecutar la función cada 3000ms (3 segundos)
     setTimeout(showSlides, 3000); 

}

  function togglePass(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        // --- MANEJO DE IMÁGENES ---
      function SelectImage(type) {
       
            if(window.api) api.send("select-image-user-admin-app", type);
      
      }

            api.receive('Imagen-user-admin-select', (event, data) => {

                    const img = document.getElementById("view-doc");

                    document.getElementById("doc-placeholder").style.display = 'none';
                } else {
                    document.getElementById("view-avatar").src = data.path || data;
                }
            });
        }

        function openFull(src) {
            if(src.includes('ImageLogin3.png') || !src) return;
            document.getElementById('img-full').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

  
  
 const reqFields = ['nombre', 'ci', 'fechanacimiento','telefono','direccion','correo', 'usuario', 'password'];

        document.addEventListener('input', () => {
            const allOk = reqFields.every(id => document.getElementById(id).value.trim() !== "");
