<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil SAIA v2 - Vista Extendida</title>
    <link rel="stylesheet" type="text/css" href="../../assets/iconos/icomoon/style.css">
    <style>
        @font-face {
            font-family: 'Inter';
            src: url('../../assets/fonts/Inter/Inter-VariableFont_opszwght.ttf') format('truetype');
            font-weight: normal; font-style: normal;
        }

        :root {
            --blue-main: #1a73e8;
            --blue-light: #e8f0fe;
            --red-main: #d93025;
            --text-dark: #202124;
            --text-gray: #5f6368;
            --bg-light: #f8f9fa;
            --border-color: #dadce0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #ffffff;
            margin: 0; padding: 0;
            width: 600px; height: 500px;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* LIGHTBOX PARA VISUALIZAR CÉDULAS */
        #viewerModal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 9999; display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }
        #viewerModal img { max-width: 90%; max-height: 80%; border: 3px solid white; border-radius: 8px; }
        .close-view { position: absolute; top: 20px; right: 20px; color: white; font-size: 24px; cursor: pointer; }

.card {
    display: none;
    flex-direction: column;
    height: 107%;
    box-sizing: border-box;
    /* background: red; */
}

        /* Cabecera optimizada */
        .profile-header {
            display: flex; align-items: center; gap: 15px;
            padding: 15px 20px; background: var(--bg-light);
            border-bottom: 1px solid var(--border-color);
        }

        .profile-img-container { position: relative; width: 65px; height: 65px; }
        .profile-img { 
            width: 100%; height: 100%; border-radius: 12px; 
            object-fit: cover; border: 2px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
        }

         .avatar-wrapper {
            position: relative; width: 65px; height: 65px;
            border-radius: 12px; overflow: hidden;
            cursor: pointer; background: white;
            border: 2px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-overlay {
            position: absolute; inset: 0; background: rgba(26, 115, 232, 0.7);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: 0.2s; color: white; font-size: 18px;
        }
        .avatar-wrapper:hover .avatar-overlay { opacity: 1; }

        /* COMPONENTE DE VISUALIZACIÓN DE DOCUMENTOS (CÉDULAS) */
        .doc-preview-box {
            position: relative; width: 60px; height: 40px;
            border-radius: 6px; overflow: hidden; border: 1px solid var(--border-color);
            background: #eee; cursor: pointer;
        }
        .doc-preview-box img { width: 100%; height: 100%; object-fit: cover; }
        .doc-overlay {
            position: absolute; inset: 0; background: rgba(26, 115, 232, 0.8);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: 0.2s; color: white; font-size: 14px;
        }
        .doc-preview-box:hover .doc-overlay { opacity: 1; }

        .scroll-content { flex: 1; overflow-y: auto; padding: 15px 20px; display: flex; flex-direction: column; gap: 15px; }

        .section-header { 
            display: flex; justify-content: space-between; align-items: flex-end; 
            margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 4px;
        }
        .section-title { font-size: 0.7rem; font-weight: 800; color: var(--blue-main); text-transform: uppercase; letter-spacing: 0.5px; }

        .data-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px;
            background: white; border: 1px solid var(--border-color);
            padding: 12px; border-radius: 8px;
        }

        .info-item { font-size: 0.85rem; color: var(--text-gray); }
        .info-item strong { color: var(--text-dark); font-size: 0.7rem; display: block; text-transform: uppercase; opacity: 0.7; }

        .courses-list { border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; }
        .course-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 12px; border-bottom: 1px solid #eee; font-size: 0.85rem;
        }
        .course-item:last-child { border-bottom: none; }
        .status-pill { padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; background: var(--blue-light); color: var(--blue-main); font-weight: bold; }

        .actions { padding: 10px 20px; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; }
        .btn-close {
            padding: 8px 25px; border-radius: 6px; border: 1px solid #fecaca;
            background: #fef2f2; color: #dc2626; cursor: pointer; font-size: 0.85rem; font-weight: 600;
        }
        .btn-close:hover { background: #fee2e2; }

        .hidden { display: none !important; }
        .scroll-content::-webkit-scrollbar { width: 6px; }
        .scroll-content::-webkit-scrollbar-thumb { background: #dadce0; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="viewerModal" onclick="this.style.display='none'">
        <i class="icon-cross close-view"></i>
        <img id="imgFull" src="">
    </div>

    <div class="card" id="main-card">
        <header class="profile-header">
            <div class="avatar-wrapper" id="btn-view-avatar" title="Ver foto de perfil">
                <img id="view-img" src="">
                <div class="avatar-overlay"><i class="icon-search"></i></div>
            </div>

            <div style="flex: 1;">
                <h2 id="view-name" style="margin:0; font-size: 1.1rem; color: var(--text-dark);">---</h2>
                <span style="font-size: 0.8rem; color: var(--text-gray);">Ci: <strong id="view-id">---</strong></span>
            </div>
            <div class="doc-preview-box" id="btn-view-doc-est" title="Ver Cédula Estudiante">
                <img id="view-doc-est-img" src="../../assets/imagen/CeddulaFalsa.png">
                <div class="doc-overlay"><i class="icon-search"></i></div>
            </div>
        </header>

        <main class="scroll-content">
            <section>
                <div class="section-header">
                    <span class="section-title">Información Personal</span>
                </div>
                <div class="data-grid">
                    <div class="info-item"><strong>Edad</strong> <span id="view-age"></span> años</div>
                    <div class="info-item"><strong>Teléfono</strong> <span id="view-tlf"></span></div>
                    <div class="info-item"><strong>Correo Electrónico</strong> <span id="view-email"></span></div>
                    <div class="info-item"><strong>Fecha de Nacimiento</strong> <span id="view-birth"></span></div>
                    <div class="info-item span-2" style="grid-column: span 2;"><strong>Dirección de Habitación</strong> <span id="view-address"></span></div>
                </div>
            </section>

            <section id="container-rep" class="hidden">
                <div class="section-header">
                    <span class="section-title">Datos del Representante</span>
                    <div class="doc-preview-box" id="btn-view-doc-rep" title="Ver Cédula Representante">
                        <img id="view-doc-rep-img" src="../../assets/imagen/CeddulaFalsa.png">
                        <div class="doc-overlay"><i class="icon-search"></i></div>
                    </div>
                </div>
                <div class="data-grid">
                    <div class="info-item"><strong>Nombre Completo</strong> <span id="rep-name"></span></div>
                    <div class="info-item"><strong>Cédula/ID</strong> <span id="rep-id"></span></div>
                    <div class="info-item"><strong>Teléfono</strong> <span id="rep-phone"></span></div>
                    <div class="info-item"><strong>Correo</strong> <span id="rep-email"></span></div>
                </div>
            </section>

            <section>
                <span class="section-title">Cursos e Inscripciones</span>
                <div id="courses-list" class="courses-list" style="margin-top: 8px;">
                    </div>
            </section>
        </main>

        <footer class="actions">
            <button class="btn-close" id="btn-close">Cerrar Perfil</button>
        </footer>
    </div>

    <script>
        const fields = {
            card: document.getElementById("main-card"),
            name: document.getElementById('view-name'),
            id: document.getElementById('view-id'),
            age: document.getElementById('view-age'),
            tlf: document.getElementById('view-tlf'),
            email: document.getElementById('view-email'),
            address: document.getElementById('view-address'),
            birth: document.getElementById('view-birth'),
            img: document.getElementById('view-img'),
            // Documentos
            docEstImg: document.getElementById('view-doc-est-img'),
            docRepImg: document.getElementById('view-doc-rep-img'),
            // Representante
            repContainer: document.getElementById('container-rep'),
            repName: document.getElementById('rep-name'),
            repId: document.getElementById('rep-id'),
            repPhone: document.getElementById('rep-phone'),
            repEmail: document.getElementById('rep-email'),
            // Cursos
            coursesList: document.getElementById('courses-list')
        };

        const modal = document.getElementById('viewerModal');
        const imgFull = document.getElementById('imgFull');

        function openViewer(src) {
            if(!src || src.includes('placeholder')) return;
            imgFull.src = src;
            modal.style.display = 'flex';
        }

        function updateUI(data) {
            if (!data) return;

            // Datos Estudiante
            fields.name.textContent = data.Name;
            fields.id.textContent = data.Cod_id;
            fields.age.textContent = data.Age;
            fields.tlf.textContent = data.Tlf;
            fields.email.textContent = data.E_mail;
            fields.address.textContent = data.Address;
            fields.birth.textContent = data.Birthdate || 'N/A';

               const arrayRecuperado = JSON.parse(data.Image)

            fields.img.src = arrayRecuperado[0] || '../../assets/imagen/user_default.png';
            
            // Imágenes de Cédulas (si vienen en el objeto)
            if(arrayRecuperado[1]) fields.docEstImg.src = arrayRecuperado[1] || '../../assets/imagen/CeddulaFalsa.png';
            if(arrayRecuperado[2]) fields.docRepImg.src = arrayRecuperado[2] || '../../assets/imagen/CeddulaFalsa.png';

            // Eventos de click para ver cédulas
    document.getElementById('btn-view-avatar').onclick = () => openViewer(fields.img.src);
       

               document.getElementById('btn-view-doc-est').onclick = () => openViewer(fields.docEstImg.src);
            document.getElementById('btn-view-doc-rep').onclick = () => openViewer(fields.docRepImg.src);

            // Lógica Representante
            if (data.Name_Representative) {
                fields.repContainer.classList.remove('hidden');
                fields.repName.textContent = data.Name_Representative;
                fields.repId.textContent = data.Cod_id_Representative || 'N/A';
                fields.repPhone.textContent = data.Tlf_Representative || 'N/A';
                fields.repEmail.textContent = data.E_mail_Representative || 'N/A';
            } else {
                fields.repContainer.classList.add('hidden');
            }

            // Cursos
            fields.coursesList.innerHTML = '';
            if (data.cursos && data.cursos.length > 0) {
                data.cursos.forEach(c => {
                    const div = document.createElement('div');
                    div.className = 'course-item';
                    div.innerHTML = `<span>${c.name}</span><span class="status-pill">Activo</span>`;
                    fields.coursesList.appendChild(div);
                });
            } else {
                fields.coursesList.innerHTML = '<div style="padding:15px; text-align:center; color:#999; font-size:0.8rem;">Sin cursos inscritos</div>';
            }

            fields.card.style.display = 'flex';
        }

        // Bridge con Electron
        if (typeof api !== 'undefined') {
            window.onload = () => api.send("Get-data-student-info");
            api.receive("data-student-information", (event, data) => updateUI(data));
        }

        document.getElementById("btn-close").addEventListener("click", () => window.close());
    </script>
</body>
</html>
