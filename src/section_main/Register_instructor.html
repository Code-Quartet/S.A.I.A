<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Instructor - SAIA</title>
    <link rel="stylesheet" type="text/css" href="../../assets/iconos/icomoon/style.css">
    <style>
        * { padding: 0; margin: 0; box-sizing: border-box; }
 @font-face {
    font-family: 'Inter';
    src: url('../../assets/fonts/Inter/Inter-VariableFont_opszwght.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}

body {
   
    font-family: 'Inter';
}
.modal-card {
    background: white;
    padding: 4px;

    max-width: 800px;
    margin: auto;
}
        .modal-header{ -webkit-app-region: no-drag;}
        .modal-header h2 { -webkit-app-region: drag;text-align: center; margin-bottom: 20px; color: #333; }

.form-container {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-gap: 3px;
    -webkit-app-region: no-drag;
}

        /* Áreas del Grid mejoradas para legibilidad */
        .field-grid1 { grid-column: span 6; display: flex; justify-content: center; }
        .field-grid2 { grid-column: span 2; }
        .field-grid3 { grid-column: span 2; }
        .field-grid4 { grid-column: span 2; }
        .field-grid5 { grid-column: span 6; }
        .field-grid6 { grid-column: span 2; }
        .field-grid7 { grid-column: span 2; }
        .field-grid8 { grid-column: span 2; }
        .field-grid9 { grid-column: span 3; }
        .field-grid10 { grid-column: span 3; }
        .field-grid11 { grid-column: span 6; }

        /* Avatar */
.main-circle {
    width: 141px;
    height: 140px;
    border-radius: 50%;
    overflow: hidden;
    background: #2d58d1;
    border: 4px solid #f0f2f5;
    position: relative;
}

.avatar-main-register { 
    width: 100%; 
    height: 100%; 
    object-fit: cover;
     pointer-events: none; 
     cursor: pointer;
}

.camera-button {
    position: relative;
    top: 91px;
    right: 37px;
    background: #e0e0e0;
    border-radius: 50%;
    width: 35px;
    height: 35px;
    border: 2px solid #fff;
    cursor: pointer;
}

        /* Inputs y Labels */
        .field { display: flex; flex-direction: column; gap: 5px; }
        .field label { font-weight: 600; font-size: 14px; color: #555; }
.field input, .field select {
    padding: 10px;
    border: 2.8px solid #d2d2d2;
    border-radius: 8px;
    font-size: 14px;
}

.field input:focus {
    border-color: #2d58d1;
    box-shadow: 0 0 8px rgb(29 58 134 / 68%);
    outline: none;
}
.field select:focus {
    border-color: #2d58d1;
    box-shadow: 0 0 8px rgb(29 58 134 / 68%);
    outline: none;
}
        /* Botones y Efecto Disable */
        .footer-buttons {
            display: flex;
            justify-content: space-between;
            padding-top: 20px;
            margin-top: 10px;
            border-top: 1px solid #eee;
        }

        .btn-footer {
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .btn-save { background: #2d58d1; color: white; border: none; }
        
        /* ESTILO DESHABILITADO */
        .btn-save:disabled {
            background: #ccc;
            color: #888;
            cursor: not-allowed;
            transform: none !important;
            opacity: 0.7;
        }

        .btn-save:not(:disabled):hover { background: #1e3fa3; transform: translateY(-2px); }

        .btn-cancel { background: transparent; border: 2px solid #2d58d1; color: #2d58d1; }

    .btn-cancel:hover {
    background: #e69d9d42;
    border: 2px solid #f44336;
    color: #f44336;
}

        /* Notification */
        .top-notification {
            position: fixed; top: 20px; right: -400px;
            background: white; padding: 15px 25px; border-radius: 10px;
            border-left: 5px solid #28a745; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.5s; z-index: 9999;
        }
        .top-notification.show { right: 20px; }
    </style>
</head>
<body>

<div class="modal-card">
    <div class="modal-header">
        <h2>Nuevo Instructor</h2>
    </div>

    <form id="instructorForm" class="form-container">
        <div class="field-grid1" onclick="SelectImagenInstructor()">
            <div class="main-circle">
                <img id="imagen" class="avatar-main-register" src="../../assets/imagen/ImageLogin3.png" alt="avatar">
           
            </div>
                 <button type="button" class="camera-button" >
                    <span class="icon-camera"></span>
                </button>
        </div>

        <div class="field field-grid2">
            <label>Nombre Completo</label>
            <input id="Name" type="text" placeholder="Ej: Marina Paula" required>
        </div>

        <div class="field field-grid3">
            <label>Edad</label>
            <input id="Age" type="text" min="1" placeholder="Ej: 20" maxlength="3" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
        </div>

        <div class="field field-grid4">
            <label>Cédula</label>
            <input id="Codpersona" type="text" placeholder="Ej: 10.458.289" oninput="this.value = this.value.replace(/[^0-9]/g, '')" maxlength="10"required >
        </div>

        <div class="field field-grid5">
            <label>Dirección</label>
            <input id="Address" type="text" placeholder="Ej: Calle 4 Av Pérez" required>
        </div>

        <div class="field field-grid6">
            <label>Correo Electrónico</label>
            <input id="Email" type="email"
            autocomplete="email" 
            spellcheck="false"  
            placeholder="correo@ejemplo.com" 
            required>
        </div>

        <div class="field field-grid7">
            <label>Teléfono</label>
            <input id="Phone" type="text" placeholder="Ej: 0412-000-0000" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
        </div>

        <div class="field field-grid8">
            <label>Estado</label>
            <select id="status" required>
                <option value="" disabled selected>Seleccione...</option>
                <option value="Activo">Activo</option>
                <option value="Inactivo">Inactivo</option>
                <option value="Despedido">Despedido</option>
            </select>
        </div>

        <div class="field field-grid9">
            <label>Especialidad</label>
            <input id="Specialty" type="text" placeholder="Ej: Manejo" required>
        </div>

        <div class="field field-grid10">
            <label>Certificaciones</label>
            <input id="Certification" type="text" placeholder="Ej: Certificado A" required>
        </div>

        <div class="footer-buttons field-grid11">
            <button type="button" class="btn-footer btn-cancel" onclick="Close()">Cancelar</button>
            <button type="button" class="btn-footer btn-cancel" onclick="LimpiarFormulario()">Limpiar</button>
            <button type="button" id="btnGuardar" class="btn-footer btn-save" onclick="ValoresFormulario()" disabled>
                Guardar <span class="icon-checkmark"></span>
            </button>
        </div>
    </form>
</div>

<div class="top-notification" id="topNotif">
    <span class="icon-checkmark"></span>
    <h3>¡Datos Guardados!</h3>
</div>

<script>
    const form = document.getElementById('instructorForm');
    const btnGuardar = document.getElementById('btnGuardar');
    
    // Lista de IDs de campos obligatorios
    const camposObligatorios = ['Name', 'Age', 'Codpersona', 'Address', 'Email', 'Phone', 'status', 'Specialty', 'Certification'];

    // Escuchar cambios en el formulario
    form.addEventListener('input', validarFormulario);

    function validarFormulario() {
        const todosLlenos = camposObligatorios.every(id => {
            const el = document.getElementById(id);
            return el.value.trim() !== "";
        });

        btnGuardar.disabled = !todosLlenos;
    }

    function SelectImagenInstructor() {
        api.send("Select-new-imagen-instructor");
    }

    api.receive("Image-select-new-instructor", (even, urlImage) => {
        document.getElementById("imagen").src = urlImage;
    });

    function LimpiarFormulario() {
        form.reset();
        document.getElementById('imagen').src = '../../assets/imagen/ImageLogin3.png';
        validarFormulario(); // Deshabilita el botón tras limpiar
    }

function Close() {

   
   api.send("button-register-instructor-activate")
window.close();

 }



    function ValoresFormulario() {
        const valores = {
            imagen: document.getElementById('imagen').src,
            nombre: document.getElementById('Name').value.trim(),
            edad: document.getElementById('Age').value,
            cedula: document.getElementById('Codpersona').value,
            direccion: document.getElementById('Address').value,
            correo: document.getElementById('Email').value,
            telefono: document.getElementById('Phone').value,
            estado: document.getElementById('status').value,
            especialidad: document.getElementById('Specialty').value,
            certificaciones: document.getElementById('Certification').value
        };

            api.send('Save-data-new-instructor', valores);
            LimpiarFormulario();


            setTimeout(()=>{

            api.send("Reload-dasboard-system-data-Instructor")    
        },1000)
    }

    api.receive("open-modal-register-instructor", (event, data) => {
        mostrarNotificacion();
    });

    function mostrarNotificacion() {
        const notif = document.getElementById('topNotif');
        notif.classList.add('show');
        setTimeout(() => notif.classList.remove('show'), 3000);
    }
</script>

</body>
</html>
