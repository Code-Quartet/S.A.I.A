<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Curso - SAIA v2 Pro</title>
    <style>


 @font-face {
    font-family: 'Inter';
    src: url('../../assets/fonts/Inter/Inter-VariableFont_opszwght.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}


    :root {
            --primary-blue: #2c5282;
            --secondary-blue: #3182ce;
            --bg-light: #f7fafc;
            --border-color: #e2e8f0;
            --text-main: #2d3748;
            --white: #ffffff;
            --error-red: #e53e3e;
            --success-green: #48bb78;
            --warning-orange: #ed8936; /* Color para Pausa */
              --danger-red: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Inter';
    background-color: var(--bg-light);
    /* display: flex; */
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    /* padding: 20px; */

    
}
        .card {
            background: var(--white);
            width: 100%;
            max-width: 550px;
           

        }

h2 {
    text-align: center;
    color: var(--text-main);
    font-size: 1.9rem;
    -webkit-app-region: drag;
    cursor:move;
}
.course-form {
     -webkit-app-region: no-drag;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    /* grid-template-rows: 1fr; */
    gap: 0px;
    padding: 4px;
    height: 93vh;
}
   .col-span-2 { grid-column: span 2; }

       .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
}
        label { font-size: 0.85rem; font-weight: 700; color: var(--text-main); }

input, select {
    padding: 0.68rem;
    border: 0.5px solid #3198ea;
    border-radius: 10px;
    font-size: 0.9rem;
    outline: none;
    transition: all 0.2s;
    width: 99%;
}
.checkbox-group {
    display: flex;
    flex-direction: row;
    justify-content: space-around;
    gap: 0.6rem;
    align-items: center;
}
        .check-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        /* Estilos de error */
        input.invalid, select.invalid { border-color: var(--error-red); background-color: #fff5f5; }
        .error-msg { color: var(--error-red); font-size: 0.75rem; margin-top: -0.5rem; display: none; }

        /* Días de la semana */
        .days-container { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 5px; }
        .day-pill { flex: 1; text-align: center; min-width: 45px; }
        .day-pill input { display: none; }
        .day-pill span {
            display: block; padding: 10px 0; background: #edf2f7;
            border-radius: 8px; font-size: 0.75rem; font-weight: 600; cursor: pointer;
        }
        .day-pill input:checked + span { background: var(--secondary-blue); color: white; }

        /* Días de la semana y Estado */
        .pill-container { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 5px; }
        .pill-item { flex: 1; text-align: center; min-width: 45px; }
        .pill-item input { display: none; }
        .pill-item span {
            display: block; padding: 10px 0; background: #edf2f7;
            border-radius: 8px; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: 0.2s;
        }

        /* Colores de selección */
        .pill-item input:checked + span.day { background: var(--secondary-blue); color: white; }
        .pill-item input:checked + span.status-active { background: var(--success-green); color: white; }
        .pill-item input:checked + span.status-pause { background: var(--warning-orange); color: white; }
        .pill-item input:checked + span.status-inactive {
         background: var(--primary-blue); color: white; 

     }

       .input-split {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 2px;
}
        .input-split input, .input-split select { flex: 1; width: 48%; }

.form-actions {
    grid-column: span 2;
    display: flex;
    justify-content: space-between;
    margin-top: 0.5rem;
}
        .btn {
            padding: 0.8rem 1.8rem; border-radius: 10px; font-weight: 600;
            cursor: pointer; border: none; display: flex; align-items: center; gap: 10px; font-size: 0.95rem;
        }

        .btn-cancel { 
            background: transparent;
             border: 1.5px solid var(--primary-blue); 
             color: var(--primary-blue); 
         }  

         .btn-cancel:hover { 
            background-color: #fceaea;
            border-color: var(--danger-red);
            color: var(--danger-red);
         }

         .btn-clear {
            background-color: transparent;
            color: var(--text-main);
            border: 1.5px solid var(--border-color);
           
        }

        .btn-clear:hover {
            background-color: #fceaea;
            border-color: var(--danger-red);
            color: var(--danger-red);
        }


        .btn-save { background: var(--secondary-blue); color: white; transition: opacity 0.3s; }
        
        /* Botón desactivado visualmente */
        .btn-save:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(0.5); }

                /* Notification */
        .top-notification {
            position: fixed; top: 20px; right: -400px;
            background: white; padding: 15px 25px; border-radius: 10px;
            border-left: 5px solid #28a745; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.5s; z-index: 9999;
        }
        .top-notification.show { right: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Nuevo Curso</h2>
    <form id="courseForm" class="course-form" novalidate>
        
        <div class="form-group col-span-2">
            <label>Nombre del Curso *</label>
            <input type="text" name="nombre" placeholder="Ej: Maquillaje" required>
        </div>

        <div class="form-group col-span-2">
            <label>Descripción</label>
            <input type="text" name="descripcion" placeholder="Ej: Curso básico profesional">
        </div>

        <div class="form-group col-span-2">
            <label>Instructor *</label>
            <select name="instructor" id="selectinstructor" required>
               
               
            </select>
        </div>

        <div class="form-group col-span-2">
            <label>Días de Clase * (Seleccione al menos uno)</label>
            <div class="days-container" id="daysBox">
                <label class="day-pill"><input type="checkbox" name="dias" value="Lun"><span>Lun</span></label>
                <label class="day-pill"><input type="checkbox" name="dias" value="Mar"><span>Mar</span></label>
                <label class="day-pill"><input type="checkbox" name="dias" value="Mie"><span>Mié</span></label>
                <label class="day-pill"><input type="checkbox" name="dias" value="Jue"><span>Jue</span></label>
                <label class="day-pill"><input type="checkbox" name="dias" value="Vie"><span>Vie</span></label>
                <label class="day-pill"><input type="checkbox" name="dias" value="Sab"><span>Sáb</span></label>
            </div>
        </div>

                <div class="form-group col-span-2">
            <label>Estado del Curso</label>
            <div class="pill-container">
                <label class="pill-item">
                    <input type="radio" name="estado" value="Activo" checked>
                    <span class="status-active">Activo</span>
                </label>
                <label class="pill-item">
                    <input type="radio" name="estado" value="Pausa">
                    <span class="status-pause">Pausa</span>
                </label>
            </div>
        </div>

        <div class="form-group">
            <label>Horario *</label>
            <div class="input-split">
                <input type="time" name="hora_inicio" required>
                <input type="time" name="hora_fin" required>
            </div>
        </div>

        <div class="form-group">
            <label>Duración *</label>
            <div class="input-split">
                <input type="number" name="duracion_valor" placeholder="Cant." min ="0"required>
                <select name="duracion_unidad">
                    <option value="Años">Años</option>
                    <option value="Meses">Meses</option>
                    <option value="Semanas" selected>Semanas</option>
                    <option value="Dias">Dias</option>
                    <option value="Horas">Horas</option>
                </select>
            </div>
        </div> 
 
        <div class="form-group">
            <label for="cupo">Cupo Máximo</label>
            <input type="number" id="cupo" name="cupo" placeholder="Ej: 20">
        </div>
        <div class="form-group">
            <label>Costo</label>
            <input type="text" name="costo" placeholder="Ej: 30$">

        </div>

        <div class="checkbox-group form-group col-span-2">
            <label class="check-item"><input type="checkbox" name="evaluacion"> Evaluación final</label>
            <label class="check-item"><input type="checkbox" name="certificado"> Entrega certificado</label>
        </div>

        <div class="form-actions">
            <button type="button" class="btn btn-cancel" id="btnClose">Cerrar</button>
         <div style="width: 50%; display: flex; justify-content: space-evenly; ">           <button type="button" class="btn btn-clear" id="btnLimpiar">Limpiar</button>
                 <button type="submit" class="btn btn-save" id="btnSave" disabled="">Guardar ✓</button>
            </div>
        </div>
    </form>
</div>
<div class="top-notification" id="topNotif">
    <span class="icon-checkmark"></span>
    <h3>¡Datos Guardados!</h3>
</div>
<script>
    window.onload=function(){
        api.send("Get-list-instructor")

    }
api.receive("Data-list-intructor", (event, data) => {
    const select = document.getElementById("selectinstructor");
    
    // 1. Corregido innerHTML (con L mayúscula)
    // 2. Es mejor limpiar y poner la opción por defecto en un solo paso
    select.innerHTML = `<option value="" disabled selected>Seleccione un instructor</option>`;

    // 3. Iteramos solo con el objeto 'instructor'
    data.forEach((instructor) => {
        // Usamos += para ir sumando las opciones
        select.innerHTML += `<option value="${instructor.Key}">${instructor.Name}</option>`;
    });
});
    const form = document.getElementById('courseForm');
    const btnSave = document.getElementById('btnSave');
    const requiredInputs = form.querySelectorAll('[required]');

    // Función para validar si todo está lleno
    function checkFormValidity() {
        let isFormValid = true;

        // 1. Validar inputs con atributo 'required'
        requiredInputs.forEach(input => {
            if (!input.value.trim()) {
                isFormValid = false;
            }
        });

        // 2. Validar que al menos un día esté seleccionado
        const diasSeleccionados = form.querySelectorAll('input[name="dias"]:checked');
        if (diasSeleccionados.length === 0) {
            isFormValid = false;
        }

        // Habilitar o deshabilitar botón
        btnSave.disabled = !isFormValid;
    }

    // Escuchar cambios en cada input para validar en tiempo real
    form.addEventListener('input', checkFormValidity);

    // Manejo del envío
    form.addEventListener('submit', (e) => {
        e.preventDefault();

        // Validación final extra por seguridad
        if (btnSave.disabled) return;

        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());
        data.dias = Array.from(form.querySelectorAll('input[name="dias"]:checked')).map(el => el.value);

        api.send("save-new-data-course", data);
      //console.log("Formulario validado y listo:", data);
             form.reset();
            checkFormValidity(); // Re-validar para desactivar el botón
            form.querySelector('input[name="nombre"]').focus();
                 

            api.send("Reload-dasboard-system-data-Course")
    
    });

    // Resetear formulario
    document.getElementById('btnLimpiar').addEventListener('click', () => {
            form.reset();
            checkFormValidity(); // Re-validar para desactivar el botón
            form.querySelector('input[name="nombre"]').focus();

    });
//cerrar
    document.getElementById('btnClose').addEventListener('click', () => {
           
      
       api.send("button-register-course-activate")
 window.close()
    });

    // Ejecutar validación inicial al cargar la página
    checkFormValidity();

    api.receive("open-modal-register-course", (event, data) => {
        mostrarNotificacion();
    });

    function mostrarNotificacion() {
        const notif = document.getElementById('topNotif');
        notif.classList.add('show');
        setTimeout(() => notif.classList.remove('show'), 3000);
    }

    "cupo": "20",

    "certificado": "on"

</script>

</body>
</html>
