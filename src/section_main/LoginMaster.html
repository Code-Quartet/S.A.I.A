<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="../../assets/iconos/icomoon/style.css">
    <style>
        @font-face {
            font-family: 'Inter';
            src: url('../../assets/fonts/Inter/Inter-VariableFont_opszwght.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --primary-blue: #3b82f6;
            --dark-blue: #2563eb;
            --danger-red: #ef4444;
            --success-green: #10b981;
            --bg-gray: #f9fafb;
            --text-main: #1f2937;
            --border-radius: 20px; /* Bordes redondeados uniformes */
        }

        * { padding: 0; margin: 0; box-sizing: border-box; }

body {
    font-family: 'Inter', sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

        /* --- CONTENEDOR PRINCIPAL REFORMADO --- */
        .master-login {
            max-width: 500px;
            width: 95%;
            background: white;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden; /* Para que la barra de carga no sobresalga */
        }

        /* BARRA DE CARGA (PROGRESO) */
        .loading-bar-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: #eee;
            display: none;
        }
        .loading-bar-fill {
            height: 100%;
            width: 0%;
            transition: width 0.1s linear;
        }

        .lock-container {
            background: #f3f4f6;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-bottom: 20px;
            transition: all 0.4s ease;
        }

 .icono {
    font-size: 50px;
    color: var(--text-main);
    margin-left: 18px;
}

        .login-content {
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--text-main);
            margin-bottom: 20px;
        }

        .input-container-password {
            position: relative;
            margin-bottom: 20px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            transition: border-color 0.3s;
            display: flex;
            align-items: center;
            padding: 5px 15px;
        }

        .input-container-password:focus-within {
            border-color: var(--primary-blue);
        }

        .master-input {
            flex: 1;
            padding: 12px 5px;
            font-size: 16px;
            border: none;
            outline: none;
            background: transparent;
        }

        .toggle-password {
            cursor: pointer;
            color: #9ca3af;
            font-size: 20px;
        }

        .message {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            min-height: 24px;
        }

        .btn-group-master {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        .btn-m {
            flex: 1;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            color: white;
            padding: 14px;
            font-size: 16px;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn-m:active { transform: scale(0.98); }
        .btn-close-m { background-color: var(--danger-red); }
        .btn-enter-m { background-color: var(--primary-blue); }

        /* Estados de animación */
        .success-bg { background-color: var(--success-green) !important; color: white !important; }
        .error-bg { background-color: var(--danger-red) !important; color: white !important; }

    </style>
</head>
<body>

    <div class="modal-card master-login">
        <div class="loading-bar-container" id="loading-bar-container">
            <div class="loading-bar-fill" id="loading-bar-fill"></div>
        </div>

        <div class="lock-container" id="lock-container">
            <span class="icono icon-lock" id="icon-lock"></span>
            <span class="icono icon-unlocked" id="icon-unlocked" style="display: none"></span>
        </div>      

        <div class="login-content">
            <h1 id="titleLogin">Contraseña Maestra</h1>
            
            <div class="input-container-password" id="container-pass">
                <input type="password" id="input-password" class="master-input" placeholder="Ingrese Contraseña Maestra">
                <span class="icon-eye toggle-password" onclick="toggleVisibility('input-password', this)"></span>
            </div>

            <p class="message" id="sms" style="display: none"></p>

            <div class="btn-group-master" id="containerBtn">
                <button class="btn-m btn-close-m" id="cerrar">Cerrar</button>
                <button class="btn-m btn-enter-m" id="Ingresar">Ingresar</button>
            </div>
        </div>
    </div>

    <script>
        // Función para la barra de carga
function startLoadingBar(duration, color) {
    return new Promise((resolve) => {
        const barContainer = document.getElementById("loading-bar-container");
        const barFill = document.getElementById("loading-bar-fill");
        
        barContainer.style.display = "block";
        barFill.style.backgroundColor = color;
        barFill.style.width = "0%";
        
        let start = null;

        function step(timestamp) {
            if (!start) start = timestamp;
            const progress = timestamp - start;
            const percentage = Math.min((progress / duration) * 100, 100);
            
            barFill.style.width = percentage + "%";

            if (progress < duration) {
                window.requestAnimationFrame(step);
            } else {
                // AQUÍ TERMINA: Ejecutamos el resolve
                resolve();
            }
        }
        window.requestAnimationFrame(step);
    });
}
        window.onload = () => document.getElementById("input-password").focus();

        document.getElementById("Ingresar").addEventListener("click", () => {
            api.send("verify_master_password", document.getElementById("input-password").value);
        });

        document.getElementById("cerrar").addEventListener("click", () => window.close());

        document.getElementById("input-password").addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                api.send("verify_master_password", document.getElementById("input-password").value);
            }
        });

/*------------------------------------------*/
api.receive("message-password-master", (event, data) => {


          const lockCont = document.getElementById("lock-container");
            const iconL = document.getElementById("icon-lock");
            const iconU = document.getElementById("icon-unlocked");
            const sms = document.getElementById("sms");
            const title = document.getElementById("titleLogin");
            const passCont = document.getElementById("container-pass");
            const btnCont = document.getElementById("containerBtn");

    if (data.sms.success) {
        // 1. Preparamos la interfaz de éxito
        lockCont.classList.add("success-bg");
        iconL.style.display = "none";

        iconU.style.display = "block";
        iconU.style.color="white";start
        sms.innerHTML = data.sms.message;
        sms.style.display = 'block';
        
        // Ocultamos el resto
        passCont.style.display = 'none';
        btnCont.style.display = 'none';
        title.style.display = 'none';

        // 2. Iniciamos la barra y esperamos a que termine
        startLoadingBar(2500, "var(--success-green)").then(() => {
            // Este código se ejecuta SOLO cuando la barra llega al 100%
            SelectAction(data.action, data.key);
            
            // Cerramos después de un breve respiro para que el usuario vea el cambio
            setTimeout(() => window.close(), 500); 
        });

    } else {
         // ERROR
                lockCont.classList.add("error-bg");
                iconL.style.color = "white";
                
                sms.innerHTML = data.sms.message;
                sms.style.color = "var(--danger-red)";
                sms.style.display = 'block';
                
                passCont.style.display = 'none';
                btnCont.style.display = 'none';
                title.style.display = 'none';

                startLoadingBar(3000, "var(--danger-red)");

                setTimeout(() => {
                    lockCont.classList.remove("error-bg");
                    lockCont.style.background = "#f3f4f6";
                    iconL.style.color = "var(--text-main)";
                    sms.style.display = 'none';
                    passCont.style.display = 'flex';
                    btnCont.style.display = 'flex';
                    title.style.display = 'block';
                    document.getElementById("loading-bar-container").style.display = "none";
                    document.getElementById("input-password").value = "";
                    document.getElementById("input-password").focus();
                }, 3000);
            }
});
/*------------------------------------------*/


        function toggleVisibility(inputId, iconElement) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                iconElement.classList.replace('icon-eye', 'icon-eye-blocked');
            } else {
                input.type = "password";
                iconElement.classList.replace('icon-eye-blocked', 'icon-eye');
            }
        }
