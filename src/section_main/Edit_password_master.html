<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña</title>
<link rel="stylesheet" href="../../assets/iconos/icomoon/style.css">
   <style type="text/css">


 @font-face {
    font-family: 'Inter';
    src: url('../../assets/fonts/Inter/Inter-VariableFont_opszwght.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}


       :root {
    --primary-color: #2b56c5;
    --text-color: #333;
    --border-color: #d1d5db;
    --placeholder-color: #9ca3af;
    --bg-color: #f9fafb;
}

body {
   font-family: 'Inter';
    background-color: #cddc390d;
    display: flex;
    justify-content: center;
    height: 100vh;
    margin: 0;
}
.card {
    background:white;
    padding: 8px;
    width: 100%;
}

h2 {
    text-align: center;
    font-size: 1.5rem;
    color: var(--text-color);
}

.div-group {
    margin-bottom: 1.5rem;
}

label {
    display: block;
    font-weight: 600;
    margin-bottom: 0.5rem;
    font-size: 0.9rem;
}

.input-container {
    position: relative;
    display: flex;
    align-items: center;
}

/* Iconos de Icomoon dentro del input */
.input-container span[class^="left-ico"] {
    position: absolute;
    left: 12px;
    color: #94a3b8; /* Color grisáceo de la imagen */
    font-size: 1.2rem;
}

input {
    width: 100%;
    padding: 12px 12px 12px 45px; /* Espacio para el icono */
    border: 1px solid var(--border-color);
    border-radius: 8px;
    font-size: 1rem;
    outline: none;
    transition: border 0.2s;
}

input:focus {
    border-color: var(--primary-color);
}

input::placeholder {
    color: var(--placeholder-color);
}

/* Contenedor de botones */
.button-group {
    display: flex;
    justify-content: space-between;
    gap: 15px;
    margin-top: 2rem;
}

button {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
}

.btn-outline {
    background: white;
    border: 1.5px solid var(--primary-color);
    color: var(--primary-color);
}

.btn-outline:hover {
    background: #f0f4ff;
}

.btn-primary {
    background: var(--primary-color);
    border: none;
    color: white;
}

.btn-primary:hover {
    background: #1e3fa1;
}
/*----------------button eyes style---------------------*/
.input-container {
    position: relative;
    display: flex;
    align-items: center;
}

.input-container input {
    width: 100%;
    padding-right: 40px; /* Espacio para el ojo */
}

.toggle-password {
    position: absolute;
    right: 10px;
    cursor: pointer;
    color: #666;
    transition: color 0.3s;
}

.toggle-password:hover {
    color: #333;
}
/*----------------button eyes style---------------------*/
   </style>
</head>
<body>

<div class="card">
    <h2>Cambiar contraseña Maestra</h2>
    <div>
<!---------------------------------->
   <div class="div-group">
    <label>Contraseña Actual</label>
    <div class="input-container">
        <span class="left-ico icon-lock"></span> 
        <input type="password" placeholder="••••••••••" id="currentPass">
        <span class="icon-eye toggle-password" onclick="toggleVisibility('currentPass', this)"></span>
    </div>
</div>

<div class="div-group">
    <label>Nueva Contraseña</label>
    <div class="input-container">
        <span class="left-ico icon-pencil"></span> 
        <input type="password" placeholder="Ingrese nueva contraseña" id="newPass">
        <span class="icon-eye toggle-password" onclick="toggleVisibility('newPass', this)"></span>
    </div>
</div>

<div class="div-group">
    <label>Confirmar Contraseña</label>
    <div class="input-container">
        <span class="left-ico icon-shield"></span> 
        <input type="password" placeholder="Ingrese nueva contraseña" id="confirmPass">
        <span class="icon-eye toggle-password" onclick="toggleVisibility('confirmPass', this)"></span>
    </div>
</div>
<!---------------------------------->

        <div class="button-group">
            <button type="button" class="btn-outline" id="btn-close">
                Cancelar <span class="icon-cross"></span>
            </button>
            <button type="submit" class="btn-primary" id="btn-update-pass">
                Confirmar <span class="icon-checkmark"></span>
            </button>
        </div>
    </div>
</div>

</body>
<script type="text/javascript">
  
window.onload=function(){

    document.getElementById("currentPass").focus()

}

document.getElementById("btn-update-pass").addEventListener("click",(event)=>{


    console.log("click-pass")
    // 1. Obtener los elementos del DOM
    const currentPass = document.getElementById('currentPass').value;
    const newPass = document.getElementById('newPass').value;
    const confirmPass = document.getElementById('confirmPass').value;

    // 2. Validaciones de estado
    if (!currentPass || !newPass || !confirmPass) {
        SendMessageAlert("Todos los campos son obligatorios.");
        return null;
    }

    if (newPass.length < 6) {
        SendMessageAlert("La nueva contraseña debe tener al menos 6 caracteres.");
        return null;
    }

    if (newPass !== confirmPass) {
        SendMessageAlert("La nueva contraseña y la confirmación no coinciden.");
        return null;
    }

    if (currentPass === newPass) {
        SendMessageAlert("La nueva contraseña no puede ser igual a la actual.");
        return null;
    }

    // 3. Si todo está bien, retornamos el valor
   // console.log("Validación exitosa. Nueva clave lista para enviar.");


     api.send("update-password-user-master",{newPass:newPass,afterPass:currentPass})

})

document.getElementById("btn-close").addEventListener("click",(event)=>{

   window.close();


})

api.receive("sms-operation-pass-ok-master",async(event,data)=>{

   await api.send("Reload-dasboard-system-data-MyProfile")

  setTimeout(function(){
     window.close();
    },1000)


})

function SendMessageAlert(sms){

    api.send("sms-alert-system-pass-master",sms)
}


function toggleVisibility(inputId, iconElement) {
    const input = document.getElementById(inputId);
    
    if (input.type === "password") {
        // Cambiar a texto para mostrar
        input.type = "text";
        // Cambiamos el icono a "ojo tachado" (ajusta la clase según tu pack de Icomoon)
        iconElement.classList.remove('icon-eye');
        iconElement.classList.add('icon-eye-blocked'); 
    } else {
        // Volver a password para ocultar
        input.type = "password";
        // Volver al icono original
        iconElement.classList.remove('icon-eye-blocked');
        iconElement.classList.add('icon-eye');
    }
}
</script>
</html>
