<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Empleado - SAIA v2</title>
    <link rel="stylesheet" type="text/css" href="../../assets/iconos/icomoon/style.css">
    
    <style>
        :root {
            --primary: #2b56c5;
            --primary-dark: #1e40af;
            --text-main: #1f2937;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --bg-main: #f8fafc;
            --success: #10b981;
            --danger: #ef4444;
        }

        @font-face {
            font-family: 'Inter';
            src: url('../../assets/fonts/Inter/Inter-VariableFont_opszwght.ttf') format('truetype');
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-main);
            font-family: 'Inter', sans-serif;
            width: 940px;
            height: 540px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- PRELOADER --- */
        #preloader {
            position: fixed; inset: 0;
            background: white;
            z-index: 1000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: opacity 0.4s ease;
        }
        .loader-spin {
            width: 45px; height: 45px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- LIGHTBOX --- */
        #lightbox {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            display: none;
            justify-content: center; align-items: center;
            backdrop-filter: blur(4px);
        }
        #lightbox img { max-width: 85%; max-height: 85%; border-radius: 8px; border: 4px solid white; }

        /* --- CONTENEDOR PRINCIPAL --- */
        .app-container {
            width: 100%; height: 100%;
            background: white;
            display: flex; flex-direction: column;
        }

        header {
            height: 55px;
            background: white;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            -webkit-app-region: drag;
        }
        header h2 { font-size: 1.1rem; color: var(--text-main); font-weight: 700; }

        /* --- LAYOUT --- */
        .content-grid {
            flex: 1;
            display: grid;
            grid-template-columns: 240px 1fr 240px;
            background: #fff;
        }

        .panel { padding: 20px; }

        /* PANEL 1: AVATAR INTEGRADO (ESTILO INSTRUCTOR) */
        .media-panel { 
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            border-right: 1px solid var(--border); 
        }

        .avatar-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin-top: 10px;
        }

        .avatar-frame {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 0 0 2px var(--primary), 0 8px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            background: #f3f4f6;
            cursor: zoom-in;
        }

        .avatar-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .avatar-frame:hover img { transform: scale(1.05); }

        /* Botón unido al elemento */
        .camera-trigger {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 42px;
            height: 42px;
            background: var(--primary);
            color: white;
            border: 4px solid white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.2s;
            z-index: 5;
        }

        .camera-trigger:hover {
            background: var(--primary-dark);
            transform: scale(1.1);
        }

        .doc-preview {
            width: 100%; height: 110px;
            background: var(--bg-main);
            border: 2px dashed var(--border);
            border-radius: 12px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.3s;
        }
        .doc-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; display: none; }

        /* PANEL 2: FORMULARIO */
        .form-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; overflow-y: auto; }
        .full { grid-column: span 2; }
        
        .form-group label { display: block; font-size: 0.65rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
        input, select { 
            width: 100%; padding: 10px; border-radius: 8px; border: 1.5px solid var(--border); 
            font-size: 0.85rem; transition: 0.2s; background: var(--bg-main);
        }
        input:focus { border-color: var(--primary); outline: none; background: #fff; box-shadow: 0 0 0 3px rgba(43, 86, 197, 0.1); }

        /* PANEL 3: SEGURIDAD */
        .security-panel { background: #fcfcfc; border-left: 1px solid var(--border); }
        .pass-box {
            background: white; padding: 12px; border-radius: 10px; border: 1.5px solid var(--border);
            margin-bottom: 15px;
        }
        .input-icon { display: flex; align-items: center; gap: 8px; }
        .input-icon input { border: none; padding: 5px; background: transparent; flex: 1; }
        .icon-eye { cursor: pointer; color: var(--text-muted); }

        /* FOOTER */
        footer {
            height: 65px;
            padding: 0 25px;
            border-top: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }

        .btn { padding: 10px 22px; border-radius: 8px; font-weight: 700; cursor: pointer; border: none; font-size: 0.8rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-sec { background: transparent; color: var(--text-muted); border: 1.5px solid var(--border); }

        #notif {
            position: fixed; top: 20px; right: -300px;
            background: var(--success); color: white; padding: 12px 20px;
            border-radius: 8px; transition: 0.5s; z-index: 3000;
        }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="loader-spin"></div>
        <p style="margin-top:12px; font-size: 0.75rem; color: var(--text-muted); font-weight: 600;">Sincronizando con SAIA v2...</p>
    </div>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="img-full" src="">
    </div>

    <div id="notif">¡Registro Exitoso!</div>

    <div class="app-container">
        <header>
            <h2>FORMULARIO DE REGISTRO - EMPLEADOS</h2>
        </header>

        <main class="content-grid">
            <section class="panel media-panel">
                <div class="avatar-container">
                    <div class="avatar-frame" onclick="openFull(document.getElementById('view-avatar').src)">
                        <img id="view-avatar" src="../../assets/imagen/ImageLogin3.png">
                    </div>
                    <div class="camera-trigger" onclick="SelectImage('avatar')">
                        <i class="icon-camera"></i>
                    </div>
                </div>
                <p style="font-size: 0.6rem; font-weight: 800; color: var(--text-muted); letter-spacing: 1px;">IDENTIDAD VISUAL</p>
                
                <div class="doc-preview" onclick="SelectImage('doc')">
                    <img id="view-doc" onclick="event.stopPropagation(); openFull(this.src)">
                    <div id="doc-placeholder" style="text-align: center;">
                        <i class="icon-image" style="font-size: 1.4rem; color: var(--primary)"></i>
                        <p style="font-size: 0.6rem; font-weight: 700; margin-top: 5px;">CÉDULA DE IDENTIDAD</p>
                    </div>
                </div>
            </section>

            <section class="panel form-panel">
                <div class="form-group full">
                    <label>Nombre y Apellido</label>
                    <input type="text" id="nombre" placeholder="Nombre completo">
                </div>
                <div class="form-group">
                    <label>Cédula</label>
                    <input type="text" id="ci" placeholder="V-00000000" maxlength="10">
                </div>
                <div class="form-group">
                    <label>F. Nacimiento</label>
                    <input type="date" id="fechanacimiento">
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="tel" id="telefono" placeholder="04xx-0000000">
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="correo" placeholder="correo@saia.com">
                </div>
                <div class="form-group full">
                    <label>Dirección Corta</label>
                    <input type="text" id="direccion" placeholder="Sector y Calle">
                </div>
                <div class="form-group">
                    <label>Rol</label>
                    <select id="tipoPermiso">
                        <option value="Sub-Administrador">Sub-Administrador</option>
                        <option value="Administrador">Administrador</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <select id="select-status-employee">
                        <option value="Activo">Activo</option>
                        <option value="Inactivo">Inactivo</option>
                    </select>
                </div>
            </section>

            <section class="panel security-panel">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label>Username</label>
                    <input type="text" id="usuario" placeholder="usuario.login">
                </div>

                <div class="pass-box">
                    <label>Contraseña</label>
                    <div class="input-icon">
                        <i class="icon-lock"></i>
                        <input type="password" id="password" placeholder="••••••">
                        <i class="icon-eye" onclick="togglePass('password')"></i>
                    </div>
                </div>

                <div id="master-container" style="display: none;">
                    <div class="pass-box" style="border-color: var(--primary); background: #eff6ff;">
                        <label style="color: var(--primary)">Key Maestra</label>
                        <div class="input-icon">
                            <i class="icon-shield" style="color: var(--primary)"></i>
                            <input type="password" id="password_Master" placeholder="Autorización">
                        </div>
                    </div>
                </div>
                <p style="font-size: 0.6rem; color: var(--text-muted); line-height: 1.4; padding: 10px;">
                    * Al presionar registrar, declara que los datos y documentos son verídicos.
                </p>
            </section>
        </main>

        <footer>
            <button class="btn btn-sec" onclick="window.close()">Cerrar</button>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-sec" onclick="clearForm()">Limpiar</button>
                <button class="btn btn-primary" id="btn-save" onclick="DatosRegistro()" disabled>Registrar Ahora</button>
            </div>
        </footer>
    </div>

    <script>
        // --- LOGICA UI ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('preloader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 400);
            }, 800);
        });

        function openFull(src) {
            if(src.includes('ImageLogin3.png') || !src) return;
            document.getElementById('img-full').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function togglePass(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        // --- MANEJO DE IMÁGENES ---
        function SelectImage(type) {
            if(window.api) api.send("select-Image-new-employee", type);
        }

        if(window.api) {
            api.receive('Image-select-new-employee', (event, data) => {
                if(data.type === 'doc') {
                    const img = document.getElementById("view-doc");
                    img.src = data.path;
                    img.style.display = 'block';
                    document.getElementById("doc-placeholder").style.display = 'none';
                } else {
                    document.getElementById("view-avatar").src = data.path || data;
                }
            });
        }

        // --- VALIDACIONES ---
        const reqFields = ['nombre', 'ci', 'fechanacimiento', 'usuario', 'password'];
        document.addEventListener('input', () => {
            const allOk = reqFields.every(id => document.getElementById(id).value.trim() !== "");
            document.getElementById('btn-save').disabled = !allOk;
        });

        document.getElementById('tipoPermiso').addEventListener('change', (e) => {
            document.getElementById('master-container').style.display = e.target.value === 'Administrador' ? 'block' : 'none';
        });

        // --- ACCION FINAL ---
        function DatosRegistro() {
            const objData = {
                Employee: {
                    nombre: document.getElementById("nombre").value,
                    ci: document.getElementById("ci").value,
                    fechanacimiento: document.getElementById("fechanacimiento").value,
                    correo: document.getElementById("correo").value,
                    tlf: document.getElementById("telefono").value,
                    direccion: document.getElementById("direccion").value,
                    image: JSON.stringify([
                        document.getElementById("view-avatar").src,
                        document.getElementById("view-doc").src
                    ]),
                    status: document.getElementById("select-status-employee").value
                },
                User: {
                    usuario: document.getElementById("usuario").value,
                    clave: document.getElementById("password").value,
                    Mclave: document.getElementById("password_Master").value || "",
                    permission: document.getElementById("tipoPermiso").value,
                }
            };
            if(window.api) api.send("save-data-registre-employee", objData);
        }

        if(window.api) {
            api.receive("open-modal-register-employee", () => {
                const notif = document.getElementById('notif');
                notif.style.right = '20px';
                setTimeout(() => {
                    notif.style.right = '-300px';
                    api.send("Reload-dasboard-system-data-Employee");
                    window.close();
                }, 2000);
            });
        }

        function clearForm() {
            reqFields.forEach(id => document.getElementById(id).value = "");
            document.getElementById("view-avatar").src = "../../assets/imagen/ImageLogin3.png";
            document.getElementById("view-doc").style.display = 'none';
            document.getElementById("doc-placeholder").style.display = 'block';
            document.getElementById('btn-save').disabled = true;
        }
    </script>
</body>
</html>
