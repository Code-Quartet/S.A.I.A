<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAIA - Papelera</title>
    <link rel="stylesheet" href="css/icomoon.css">
    <style>
        :root {
            --primary-blue: #2546d1;
            --secondary-blue: #eef2ff;
            --text-main: #374151;
            --text-light: #6b7280;
            --border-color: #e5e7eb;
            --danger-red: #dc2626;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .container {
            background: var(--white);
            width: 100%;
            max-width: 1000px;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--text-main);
            margin-bottom: 25px;
        }

        /* --- Notificación (Modal/Banner) --- */
        .notification-banner {
            background-color: var(--secondary-blue);
            border: 1px solid #c7d2fe;
            color: #1e40af;
            padding: 12px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            animation: fadeInDown 0.5s ease;
        }

        .notification-banner .icon-info {
            background: var(--primary-blue);
            color: white;
            border-radius: 50%;
            padding: 5px;
            font-size: 0.7rem;
        }

        /* --- Barra de Herramientas --- */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            gap: 20px;
        }

        .search-container {
            flex-grow: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-container input {
            width: 100%;
            padding: 10px 40px 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
        }

        .search-container .icon-search {
            position: absolute;
            right: 15px;
            color: var(--text-light);
        }

        .tabs-filter {
            display: flex;
            gap: 10px;
        }

        .tab-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: var(--text-light);
            cursor: pointer;
            font-weight: 500;
            border-radius: 6px;
        }

        .tab-btn.active {
            background: var(--primary-blue);
            color: white;
        }

        /* --- Tabla con CSS Grid --- */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .data-table thead tr {
            border-bottom: 1px solid var(--border-color);
        }

        .data-table th {
            text-align: left;
            padding: 12px;
            font-size: 0.85rem;
            color: var(--text-label);
            background-color: #f9fafb;
        }

        .data-table td {
            padding: 12px;
            font-size: 0.85rem;
            color: var(--text-main);
            border-bottom: 1px solid #f3f4f6;
        }

        .col-blue { color: #3b82f6; font-weight: 500; }

        .actions-cell {
            display: flex;
            gap: 15px;
            font-size: 1.1rem;
        }

        .icon-restore { color: var(--primary-blue); cursor: pointer; }
        .icon-trash { color: var(--danger-red); cursor: pointer; }

        /* --- Footer --- */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }

        .pagination {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: auto;
            margin-right: auto;
        }

        .page-btn {
            width: 32px;
            height: 32px;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .page-btn.active {
            background: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
        }

        .btn-empty {
            background-color: var(--danger-red);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Papelera</h1>

    <div class="notification-banner" id="banner">
        <span class="icon-info">!</span>
        <span>Después de 30 días en la papelera, los elementos se borran permanentemente.</span>
    </div>

    <div class="toolbar">
        <div class="search-container">
            <input type="text" placeholder="Buscar">
            <span class="icon-search"></span>
        </div>
        
        <div class="tabs-filter">
            <button class="tab-btn active">Inscritos</button>
            <button class="tab-btn">Cursos</button>
            <button class="tab-btn">Instructores</button>
            <button class="tab-btn">Empleados</button>
        </div>
    </div>

    <table class="data-table">
        <thead>
            <tr>
                <th>Nombre Completo</th>
                <th>Cédula</th>
                <th>Curso</th>
                <th>Fecha de Inscripción</th>
                <th>Fecha de Eliminación</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr>
                <td>Carlos Alexander Soto Fuentes</td>
                <td>31.234.456</td>
                <td class="col-blue">Dibujo</td>
                <td>07/10/2024</td>
                <td>15/10/2024</td>
                <td class="actions-cell">
                    <span class="icon-restore icon-undo"></span>
                    <span class="icon-trash"></span>
                </td>
            </tr>
            </tbody>
    </table>

    <div class="footer">
        <div class="pagination">
            <span class="icon-chevron-left"></span>
            <button class="page-btn active">1</button>
            <button class="page-btn">2</button>
            <span class="icon-chevron-right"></span>
        </div>
        
        <button class="btn-empty">
            Vaciar Papelera <span class="icon-trash"></span>
        </button>
    </div>
</div>

<script>
    // Generar datos ficticios para la tabla basándose en la imagen
    const data = [
        { nombre: "Carlos Alexander Soto Fuentes", cedula: "31.234.456", curso: "Dibujo" },
        { nombre: "Jesús Alberto García Castro", cedula: "26.876.543", curso: "Manejo" },
        { nombre: "María Alejandra Pérez González", cedula: "31.234.456", curso: "Fotografía" },
        { nombre: "Carlos José Rodríguez Mora", cedula: "28.765.432", curso: "Dibujo" },
        { nombre: "Ana Isabella Contreras Rojas", cedula: "27.654.321", curso: "Inglés" }
    ];

    const tbody = document.getElementById('table-body');

    function renderTable() {
        tbody.innerHTML = data.map(item => `
            <tr>
                <td>${item.nombre}</td>
                <td>${item.cedula}</td>
                <td class="col-blue">${item.curso}</td>
                <td>07/10/2024</td>
                <td>15/10/2024</td>
                <td class="actions-cell">
                    <span class="icon-undo" title="Restaurar"></span>
                    <span class="icon-trash" title="Eliminar permanentemente"></span>
                </td>
            </tr>
        `).join('');
    }

    // Cerrar banner automáticamente después de unos segundos (opcional)
    // setTimeout(() => { document.getElementById('banner').style.display = 'none'; }, 10000);

    renderTable();
</script>

</body>
</html>
