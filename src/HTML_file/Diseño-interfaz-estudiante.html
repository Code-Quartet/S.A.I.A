<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Usuario - Mario Pérez</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --blue-main: #1a73e8;
            --red-main: #d93025;
            --green-status: #e6f4ea;
            --blue-status: #e8f0fe;
            --text-gray: #5f6368;
            --border-color: #dadce0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Contenedor Principal */
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 550px;
            padding: 25px;
        }

        /* Flexbox: Encabezado (Foto + Datos) */
        .profile-header {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 10px;
            object-fit: cover;
            background-color: #eee;
        }

        .profile-data h2 {
            margin: 0 0 10px 0;
            font-size: 1.25rem;
            color: #202124;
        }

        .info-item {
            font-size: 0.9rem;
            color: var(--text-gray);
            margin: 4px 0;
            display: flex;
            align-items: center;
        }

        /* CSS Grid: Tabla de Cursos */
        .courses-container {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr; /* Tres columnas proporcionales */
            gap: 15px 10px;
            margin-bottom: 30px;
        }

        .grid-label {
            font-weight: bold;
            color: #3c4043;
            font-size: 0.95rem;
            padding-bottom: 5px;
        }

        .grid-item {
            font-size: 0.9rem;
            color: #555;
            display: flex;
            align-items: center;
        }

        /* Estilos de Estado */
        .status-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
        }

        .status-pill.in-progress {
            background-color: var(--blue-status);
            color: var(--blue-main);
        }

        .status-pill.completed {
            background-color: var(--green-status);
            color: #1e8e3e;
        }

        /* Flexbox: Botones de Acción */
        .actions {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            border-top: 1px solid #f1f3f4;
            padding-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-edit {
            background: white;
            border: 1.5px solid var(--blue-main);
            color: var(--blue-main);
        }

        .btn-delete {
            background: white;
            border: 1.5px solid var(--red-main);
            color: var(--red-main);
        }

        .btn:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="card">
        <header class="profile-header">
            <img src="../assets/imagen/business.png" alt="Avatar" class="profile-img">
            <div class="profile-data">
                <h2>Mario Alejandro Pérez Salinas</h2>
                <div class="info-item">Edad: 25</div>
                <div class="info-item">Cédula: 31.234.543</div>
                <div class="info-item">Teléfono: 0424-557-5783</div>
                <div class="info-item">Correo Electrónico: marioficial@correo.com</div>
                <div class="info-item">Dirección: Calle 50, Av Guanipa</div>
            </div>
        </header>

        <section class="courses-container">
            <div class="grid-label">Cursos Inscritos</div>
            <div class="grid-label">Fecha de Inscripción</div>
            <div class="grid-label">Estado</div>

            <div class="grid-item">Dibujo</div>
            <div class="grid-item">07/05/2025</div>
            <div class="grid-item">
                <span class="status-pill in-progress">En Curso</span>
            </div>

            <div class="grid-item">Fotografía</div>
            <div class="grid-item">07/05/2025</div>
            <div class="grid-item">
                <span class="status-pill in-progress">En Curso</span>
            </div>

            <div class="grid-item">Oratoria</div>
            <div class="grid-item">17/10/2024</div>
            <div class="grid-item">
                <span class="status-pill completed">Completado</span>
            </div>
        </section>

        <footer class="actions">
            <button class="btn btn-edit">
                <i class="fa-solid fa-pencil"></i> Editar Información
            </button>
            <button class="btn btn-delete">
                <i class="fa-solid fa-trash"></i> Eliminar Inscrito
            </button>
        </footer>
    </div>

</body>
</html>
