        /* Cuerpo con CSS Grid */
.card-body {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0px;
}

        .info-group h3 {

            margin-bottom: 12px;

        }

        }

        /* Botones con Flexbox */
.card-actions {

    margin-top: 5px;
}

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            display: flex;

            justify-content: center;

        }

        .btn-edit {

<body>

<div class="card-container">
    <header class="card-header">
        <img id="profile-img" src="" alt="Cargando..." class="profile-img">
        <div class="header-info">
            <h1 id="instructor-name">---</h1>
            <p>Especialidad: <strong id="instructor-specialty">---</strong></p>
            <p>Estado: <span id="instructor-status" class="badge">---</span></p>
        </div>
    </header>

    <hr>

    <main class="card-body">
        <section class="info-group">
            <h3>Datos Personales</h3>
            <div class="info-item"><strong>Teléfono:</strong> <span id="info-tlf"></span></div>
            <div class="info-item"><strong>Edad:</strong> <span id="info-age"></span></div>
            <div class="info-item"><strong>Cédula:</strong> <span id="info-cod"></span></div>
            <div class="info-item"><strong>Correo Electrónico:</strong> <span id="info-email"></span></div>
            <div class="info-item"><strong>Dirección:</strong> <span id="info-address"></span></div>
            <div class="info-item"><strong>Certificaciones:</strong> <span id="info-certs"></span></div>
        </section>

        <section class="info-group">
            <div class="info-item"><strong>Ingreso:</strong> <span id="info-date"></span></div>
        </section>
    </main>

    <footer class="card-actions">
        <button class="btn btn-delete" id="Btnclose">
            Cerrar
        </button>
    </footer>
</div>

<script>
    /**
     * Función para inyectar datos en el HTML
     */
    function addingData(data) {
        if (!data) return;

        // Mapeo de elementos de cabecera
        document.getElementById('instructor-name').textContent = data.Name;
        document.getElementById('instructor-specialty').textContent = data.Specialty;
        document.getElementById('instructor-status').textContent = data.Status;
        document.getElementById('instructor-status').classList.add(data.Status);
        
        // Imagen (Manejo de ruta local)
        const img = document.getElementById('profile-img');
        // Nota: En navegadores modernos, las rutas C:\\ no cargan por seguridad. 
        // He puesto una imagen de respaldo por si la ruta local falla.
        img.src = data.Image; 
        img.onerror = () => {
            img.src = "https://ui-avatars.com/api/?name=" + data.Name + "&background=random";
        };

        // Mapeo de Datos Personales
        document.getElementById('info-tlf').textContent = data.Tlf;
        document.getElementById('info-age').textContent = data.Age + " años";
        document.getElementById('info-cod').textContent = data.Cod_id;
        document.getElementById('info-email').textContent = data.E_mail;
        document.getElementById('info-address').textContent = data.Address;
        document.getElementById('info-certs').textContent = data.Certifications;

        // Mapeo de Fecha
        document.getElementById('info-date').textContent = data.Date;

        console.log("Información actualizada para:", data.Name);
    }

    // Ejecutar la función al cargar la página
    window.onload = () => {
      
        api.send("get-data-instructor-info")
    };
    api.receive("data-instructor",(event,data)=>{

        addingData(data);
    })

document.getElementById("Btnclose").addEventListener("click",()=>{
        console.log("cerrar")

        window.close();
    })
</script>

</body>
</html>
