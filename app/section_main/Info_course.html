<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="../assets/iconos/icomoon/style.css">
    <title>S.A.I.A - Detalle del Curso</title>
    <style>
        /* VARIABLES Y RESET */
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #22c55e;
            --danger: #ef4444;
        }

body {
    background-color: var(--bg-body);
    font-family: 'Segoe UI', Roboto, sans-serif;
    /* display: flex; */
    /* justify-content: center; */
    /* align-items: center; */
    min-height: 100vh;
    margin: 0;
}

        /* CONTENEDOR PRINCIPAL (CARD) */
.course-card {
    background: var(--bg-card);
    /* width: 90%; */
    /* max-width: 550px; */
    /* border-radius: 12px; */
    /* box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); */
    /* border: 1px solid var(--border-color); */
    /* overflow: hidden; */
}
        /* HEADER */
        .course-header {
            background: #f8fafc;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
        }

        .course-title-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .course-header h2 {
            margin: 0;
            font-size: 1.25rem;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-badge.active { background: #dcfce7; color: #166534; }

        /* CUERPO */
        .course-body {
            padding: 20px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .info-item label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 5px;
        }

        .info-item p {
            margin: 0;
            font-size: 0.95rem;
            color: var(--text-main);
            font-weight: 600;
        }

        .cost-highlight {
            color: var(--primary);
            font-size: 1.1rem !important;
        }

        /* DESCRIPCIÓN */
        .description-box {
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
            margin-bottom: 20px;
        }

        .description-box label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .description-box p {
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text-main);
            margin: 0;
        }

        /* TAGS */
        .features-container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .feature-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            background: #f1f5f9;
            color: #cbd5e1; /* Color apagado por defecto */
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .feature-tag.enabled {
            background: #eff6ff;
            color: var(--primary);
            border-color: #bfdbfe;
        }

        /* FOOTER */
        .course-footer {
            background: #f8fafc;
            padding: 15px 20px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            border-top: 1px solid var(--border-color);
        }

        .btn {
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-delete { background: #fee2e2; color: var(--danger); }
        .btn-delete:hover { background: #fecaca; }

    </style>
</head>
<body>

    <div class="course-card">
        <header class="course-header">
            <div class="course-title-section">
                <h2 id="view-name">Cargando...</h2>
            </div>
            <span class="status-badge active" id="view-status">---</span>
        </header>

        <div class="course-body">
            <div class="info-grid">
                <div class="info-item">
                    <label><span class="icon-user"></span> Instructor</label>
                    <p id="view-instructor">---</p>
                </div>
                <div class="info-item">
                    <label><span class="icon-calendar"></span> Días</label>
                    <p id="view-days">---</p>
                </div>
                <div class="info-item">
                    <label><span class="icon-clock"></span> Horario</label>
                    <p id="view-time">---</p>
                </div>
                <div class="info-item">
                    <label><span class="icon-hour-glass"></span> Duración</label>
                    <p id="view-duration">---</p>
                </div>
                <div class="info-item">
                    <label><span class="icon-users"></span> Cupo Máximo</label>
                    <p id="view-capacity">---</p>
                </div>
                <div class="info-item">
                    <label><span class="icon-coin-dollar"></span> Inversión</label>
                    <p id="view-cost" class="cost-highlight">---</p>
                </div>
            </div>

            <div class="description-box">
                <label>Descripción</label>
                <p id="view-description">---</p>
            </div>

            <div class="features-container">
                <div id="tag-evaluation" class="feature-tag">
                    <span class="icon-clipboard"></span> Evaluación
                </div>
                <div id="tag-certificate" class="feature-tag">
                    <span class="icon-certificate"></span> Certificado
                </div>
            </div>
        </div>

        <footer class="course-footer">
            <button class="btn btn-delete" onclick="CerrarInfoCourse()">
                <span class="icon-exit"></span> Cerrar
            </button>
        </footer>
    </div>

    <script>
        // Al cargar la ventana, pedir datos al proceso principal
        window.onload = function() {
            if (window.api) {
                api.send("get-data-course-info");
            }
        };

        function renderCurso(data) {
            if (!data) return;

            document.getElementById('view-name').innerText = data.Name || 'Sin nombre';
            document.getElementById('view-status').innerText = data.Status || 'Inactivo';
            document.getElementById('view-instructor').innerText = data.Nombre_Instructor || 'No asignado';
            document.getElementById('view-days').innerText = data.Days || 'No definidos';
            document.getElementById('view-time').innerText = `${data.Start_Time} - ${data.End_Time}`;
            document.getElementById('view-duration').innerText = `${data.Duration_Value} ${data.Duration_Unit}`;
            document.getElementById('view-capacity').innerText = `${data.Capacity} Estudiantes`;
            document.getElementById('view-cost').innerText = `$${data.Cost}`;
            document.getElementById('view-description').innerText = data.Description || 'Sin descripción disponible.';

            // Manejo de clases dinámicas para los tags (1 = habilitado, 0 = deshabilitado)
            const tagEval = document.getElementById('tag-evaluation');
            const tagCert = document.getElementById('tag-certificate');

            data.Has_Evaluation == 1 ? tagEval.classList.add('enabled') : tagEval.classList.remove('enabled');
            data.Has_Certificate == 1 ? tagCert.classList.add('enabled') : tagCert.classList.remove('enabled');
        }

        // Escuchar respuesta de Electron
        if (window.api) {
            api.receive("data-course-info", (event, data) => {
                console.log("Datos recibidos:", data);
                renderCurso(data);
            });
        }

        function CerrarInfoCourse() { 
            window.close();
        }
    </script>
</body>
</html>
