<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Instructor - SAIA</title>
    <link rel="stylesheet" type="text/css" href="../assets/iconos/icomoon/style.css">
    <style>
        * { padding: 0; margin: 0; box-sizing: border-box; }

.modal-card {
    background: white;
    padding: 4px;
    font-family: 'Segoe UI', Arial, sans-serif;
    max-width: 800px;
    margin: auto;
}
        .modal-header h2 { text-align: center; margin-bottom: 20px; color: #333; }

.form-container {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-gap: 3px;
}

        /* Áreas del Grid mejoradas para legibilidad */
        .field-grid1 { grid-column: span 6; display: flex; justify-content: center; }
        .field-grid2 { grid-column: span 2; }
        .field-grid3 { grid-column: span 2; }
        .field-grid4 { grid-column: span 2; }
        .field-grid5 { grid-column: span 6; }
        .field-grid6 { grid-column: span 2; }
        .field-grid7 { grid-column: span 2; }
        .field-grid8 { grid-column: span 2; }
        .field-grid9 { grid-column: span 3; }
        .field-grid10 { grid-column: span 3; }
        .field-grid11 { grid-column: span 6; }

        /* Avatar */
.main-circle {
    width: 141px;
    height: 140px;
    border-radius: 50%;
    overflow: hidden;
    background: #2d58d1;
    border: 4px solid #f0f2f5;
    position: relative;
}
        .avatar-main-register {
         width: 100%; 
         height: 100%; 
         object-fit: cover;
          pointer-events: none;
          }

.camera-button {
    position: relative;
    top: 91px;
    right: 37px;
    background: #e0e0e0;
    border-radius: 50%;
    width: 35px;
    height: 35px;
    border: 2px solid #fff;
    cursor: pointer;
}

        /* Inputs y Labels */
        .field { display: flex; flex-direction: column; gap: 5px; }
        .field label { font-weight: 600; font-size: 14px; color: #555; }
        .field input, .field select {
            padding: 10px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .field input:focus {
            border-color: #2d58d1;
            box-shadow: 0 0 5px rgba(43, 86, 197, 0.2);
            outline: none;
        }
        /* Botones y Efecto Disable */
        .footer-buttons {
            display: flex;
            justify-content: space-between;
            padding-top: 20px;
            margin-top: 10px;
            border-top: 1px solid #eee;
        }

        .btn-footer {
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .btn-save { background: #2d58d1; color: white; border: none; }
        
        /* ESTILO DESHABILITADO */
        .btn-save:disabled {
            background: #ccc;
            color: #888;
            cursor: not-allowed;
            transform: none !important;
            opacity: 0.7;
        }

        .btn-save:not(:disabled):hover { background: #1e3fa3; transform: translateY(-2px); }

        .btn-cancel { background: transparent; border: 2px solid #2d58d1; color: #2d58d1; }

            .btn-cancel:hover {
    background: #e69d9d42;
    border: 2px solid #f44336;
    color: #f44336;
}


        /* Notification */
        .top-notification {
            position: fixed; top: 20px; right: -400px;
            background: white; padding: 15px 25px; border-radius: 10px;
            border-left: 5px solid #28a745; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.5s; z-index: 9999;
        }
        .top-notification.show { right: 20px; }
    </style>
</head>
<body>

<div class="modal-card">
    <div class="modal-header">
        <h2>Actualizar Instructor</h2>
    </div>

    <form id="instructorForm" class="form-container">
        <div class="field-grid1">
            <div class="main-circle">
                <img id="imagen" class="avatar-main-register" src="../assets/imagen/ImageLogin3.png" alt="avatar">
           
            </div>
                 <button type="button" class="camera-button" onclick="SelectImagenInstructor()">
                    <span class="icon-camera"></span>
                </button>
        </div>

        <div class="field field-grid2">
            <label>Nombre Completo</label>
            <input id="Name" type="text" placeholder="Ej: Marina Paula" required>
        </div>

        <div class="field field-grid3">
            <label>Edad</label>
            <input id="Age" type="number" placeholder="Ej: 20" required>
        </div>

        <div class="field field-grid4">
            <label>Cédula</label>
            <input id="Codpersona" type="text" placeholder="Ej: 10.458.289" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
        </div>

        <div class="field field-grid5">
            <label>Dirección</label>
            <input id="Address" type="text" placeholder="Ej: Calle 4 Av Pérez" required>
        </div>

        <div class="field field-grid6">
            <label>Correo Electrónico</label>
            <input id="Email"
            type="email" 
            autocomplete="email" 
            spellcheck="false"   
            placeholder="correo@ejemplo.com" required>
        </div>

        <div class="field field-grid7">
            <label>Teléfono</label>
            <input id="Phone" type="text" placeholder="Ej: 0412-000-0000" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
        </div>

        <div class="field field-grid8">
            <label>Estado</label>
            <select id="status" required>
                <option value="" disabled selected>Seleccione...</option>
                <option value="Activo">Activo</option>
                <option value="Inactivo">Inactivo</option>
                <option value="Despedido">Despedido</option>
            </select>
        </div>

        <div class="field field-grid9">
            <label>Especialidad</label>
            <input id="Specialty" type="text" placeholder="Ej: Manejo" required>
        </div>

        <div class="field field-grid10">
            <label>Certificaciones</label>
            <input id="Certification" type="text" placeholder="Ej: Certificado A" required>
        </div>

        <div class="footer-buttons field-grid11">
            <button type="button" class="btn-footer btn-cancel" onclick="Close()">Cancelar</button>
            <button type="button" class="btn-footer btn-cancel" onclick="LimpiarFormulario()">Limpiar</button>
            <button type="button" id="btnGuardar" class="btn-footer btn-save" onclick="ValoresFormulario()" disabled>
                Guardar <span class="icon-checkmark"></span>
            </button>
        </div>
    </form>
</div>

<div class="top-notification" id="topNotif">
    <span class="icon-checkmark"></span>
    <h3>¡Datos Guardados!</h3>
</div>

<script>
const form = document.getElementById('instructorForm');
const btnGuardar = document.getElementById('btnGuardar');
const imgElement = document.getElementById('imagen');

// Lista de IDs de campos obligatorios
const camposObligatorios = ['Name', 'Age', 'Codpersona', 'Address', 'Email', 'Phone', 'status', 'Specialty', 'Certification'];

// 1. Cargar datos al iniciar
window.addEventListener('DOMContentLoaded', () => {
    api.send("get-data-instructor");
});

// 2. Recibir datos y llenar el formulario
let key_intsructor=null;
api.receive("data-instructor", (event, data) => {
    if (!data) return;
    key_intsructor=data.Key;
    document.getElementById('imagen').src = data.image || "../assets/imagen/ImageLogin3.png";
    document.getElementById('Name').value = data.Name || "";
    document.getElementById('Age').value = data.Age || "";
    document.getElementById('Codpersona').value = data.Cod_id || "";
    document.getElementById('Address').value = data.Address || "";
    document.getElementById('Email').value = data.E_mail || "";
    document.getElementById('Phone').value = data.Tlf || "";
    document.getElementById('status').value = data.Status || "";
    document.getElementById('Specialty').value = data.Specialty || "";
    document.getElementById('Certification').value = data.Certifications || "";

    // IMPORTANTE: Validar apenas se cargan los datos para habilitar el botón
    validarFormulario();
});

// 3. Validación lógica
function validarFormulario() {
    const todosLlenos = camposObligatorios.every(id => {
        const el = document.getElementById(id);
        return el && el.value.trim() !== "";
    });

    btnGuardar.disabled = !todosLlenos;
}

// Escuchar cambios en los inputs
form.addEventListener('input', validarFormulario);

// 4. Gestión de Imagen
function SelectImagenInstructor() {
    api.send("Select-update-imagen-instructor");
}

api.receive("Image-select-update-instructor", (even, urlImage) => {
    imgElement.src = urlImage;
    validarFormulario(); // Re-validar por si la imagen era lo único pendiente
});

// 5. Acciones del Formulario
function LimpiarFormulario() {
    form.reset();
    imgElement.src = '../assets/imagen/ImageLogin3.png';
    validarFormulario(); 
}

function Close() { 
    api.send("Reload-dasboard-system-data-Instructor")
  setTimeout(function(){
     window.close();
    },1800)
}

function ValoresFormulario() {
    // Evitamos enviar si el botón está deshabilitado por seguridad
    if (btnGuardar.disabled) return;

    const valores = {
        key:key_intsructor,
        imagen: imgElement.src,
        nombre: document.getElementById('Name').value.trim(),
        edad: document.getElementById('Age').value,
        cedula: document.getElementById('Codpersona').value,
        direccion: document.getElementById('Address').value,
        correo: document.getElementById('Email').value,
        telefono: document.getElementById('Phone').value,
        estado: document.getElementById('status').value,
        especialidad: document.getElementById('Specialty').value,
        certificaciones: document.getElementById('Certification').value
    };

    api.send('Save-data-update-instructor', valores);
    
    // Opcional: No limpiar inmediatamente si es una "Actualización" 
    // para que el usuario vea que terminó, o cerrar la ventana.
    mostrarNotificacion();
}

// 6. Notificaciones
api.receive("open-modal-update-instructor", (event, data) => {
    mostrarNotificacion();
});

function mostrarNotificacion() {
    const notif = document.getElementById('topNotif');
    notif.classList.add('show');
    setTimeout(() => {
        notif.classList.remove('show');
    }, 3000);
}
</script>

</body>
</html>
