<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Instructor</title>
    <link rel="stylesheet" href="https://releases.icomoon.io/h9S9Ym/style.css">
    <style>
        /* --- ESTILOS GENERALES --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .modal-container {
            background-color: #fff;
            width: 90%;
            max-width: 650px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
        }

        /* Botón de cerrar (X) */
        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #e0e0e0;
            color: #666;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 14px;
        }

        h2 {
            text-align: center;
            color: #444;
            margin-bottom: 25px;
            font-weight: 500;
        }

        /* --- ESTRUCTURA CSS GRID --- */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Dos columnas iguales */
            gap: 15px 20px;
        }

        /* Elementos que ocupan todo el ancho */
        .full-width {
            grid-column: span 2;
        }

        /* Ajuste específico para nombre y edad */
        .name-field { grid-column: span 1; }
        .age-field { width: 80px; justify-self: end; }

        /* --- ESTILOS DE INPUTS --- */
        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        input, select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            color: #666;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #2b59c3;
        }

        /* Estilo para los selectores personalizados */
        .select-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .select-wrapper select {
            width: 100%;
            appearance: none;
            background-color: #fff;
        }

        .select-wrapper i {
            position: absolute;
            right: 15px;
            pointer-events: none;
            color: #999;
        }

        /* --- CAMPO DE FOTO (FLEXBOX) --- */
        .upload-container {
            display: flex;
            align-items: center;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 5px;
            gap: 10px;
        }

        .photo-placeholder {
            width: 40px;
            height: 40px;
            background-color: #e0e0e0;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #999;
        }

        .upload-text {
            flex-grow: 1;
            color: #aaa;
            font-size: 13px;
        }

        .btn-upload {
            background-color: #2b59c3;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

/* --- ACCIONES FINALES (FLEXBOX) --- */
        .form-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 25px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.9; }

        .btn-cancel {
            background-color: #fff;
            color: #2b59c3;
            border: 1px solid #2b59c3;
        }

        .btn-save {
            background-color: #2b59c3;
            color: white;
            border: none;
        }

    </style>
</head>
<body>

    <div class="modal-container">
        <h2>Editar Instructor</h2>
        <form>
            <div class="form-grid">
                <div class="form-group name-field">
                    <label>Nombre Completo</label>
                    <input type="text" value="Cristian Luis Blanco Toyota">
                </div>
                <div class="form-group age-field">
                    <label>Edad</label>
                    <input type="number" value="29">
                </div>

                <div class="form-group">
                    <label>Cedula</label>
                    <input type="text" value="10.234.543">
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="text" value="0412-389-5783">
                </div>

                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" value="c.blanco@correo.com">
                </div>
                <div class="form-group">
                    <label>Dirección</label>
                    <input type="text" value="Calle 24 Av Bolívar">
                </div>

                <div class="form-group">
                    <label>Foto</label>
                    <div class="upload-container">
                        <div class="photo-placeholder"><i class="icon-image"></i></div>
                        <span class="upload-text">Selecciona una imagen</span>
                        <button type="button" class="btn-upload">Subir</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <div class="select-wrapper">
                        <select>
                            <option>Activo</option>
                            <option>Inactivo</option>
                        </select>
                        <i class="icon-chevron-down"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>Especialidad</label>
                    <input type="text" value="Fotógrafo">
                </div>
                <div class="form-group">
                    <label>Cursos Asignados</label>
                    <div class="select-wrapper">
                        <select>
                            <option>Fotografía</option>
                            <option>Diseño</option>
                        </select>
                        <i class="icon-chevron-down"></i>
                    </div>
                </div>

                <div class="form-group full-width">
                    <label>Certificaciones</label>
                    <input type="text" value="Instructor certificado por Escuela de Fotografía">
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn btn-cancel">
Cancelar <i class="icon-cross"></i>
                </button>
                <button type="submit" class="btn btn-save">
                    Guardar <i class="icon-checkmark"></i>
                </button>
            </div>
        </form>
    </div>

</body>
</html>
