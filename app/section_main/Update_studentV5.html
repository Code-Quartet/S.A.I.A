<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar Estudiante - SAIA v2</title>
    <link rel="stylesheet" type="text/css" href="../assets/iconos/icomoon/style.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #eef2ff;
            --success: #10b981;
            --bg-window: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --white: #ffffff;
            --radius-md: 12px;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
body {
    background: var(--bg-window);
    margin: 0;
    overflow: hidden;
    height: 100vh;
    width: 100%;
    color: var(--text-main);
    display: flex;
    flex-direction: column;
}
        /* PRELOADER GLOBAL */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--white); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        .loader-spin {
            width: 30px; height: 30px; border: 3px solid var(--border);
            border-top: 3px solid var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* PRELOADER EN INPUTS */
        .input-group { position: relative; display: flex; align-items: center; width: 100%; }
        .input-group i:not(.field-loader) { position: absolute; left: 10px; color: var(--text-muted); font-size: 14px; z-index: 2; }
        
        .field-loader {
            position: absolute; right: 10px; width: 14px; height: 14px;
            border: 2px solid var(--border); border-top: 2px solid var(--primary);
            border-radius: 50%; animation: spin 1s linear infinite;
            display: none; z-index: 2;
        }
        .loading .field-loader { display: block; }
        .loading input, .loading select { background: #f1f5f9; pointer-events: none; padding-right: 30px; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .app-container { width: 100%; height: 100%; display: flex; flex-direction: column; background: var(--white); }

        header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 14px; margin: 0; font-weight: 800; color: var(--primary); text-transform: uppercase; }

        .main-content { flex: 1; overflow-y: auto; padding: 15px 20px; }

        /* ÁREA DE IMAGEN Y TOGGLE */
        .hero-section { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; }
        
        .avatar-container {
            position: relative; width: 90px; height: 90px;
            cursor: pointer; padding: 4px;
            background: linear-gradient(135deg, var(--primary-light), var(--white));
            border-radius: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .avatar-container:hover { transform: scale(1.05); }
        .avatar-container img { width: 100%; height: 100%; border-radius: 20px; object-fit: cover; background: var(--white); }
        .avatar-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.3);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: 0.3s; color: white; font-size: 20px;
        }
        .avatar-container:hover .avatar-overlay { opacity: 1; }

        .toggle-card { 
            flex: 1; background: #f1f5f9; padding: 15px 18px; border-radius: 16px; 
            display: flex; justify-content: space-between; align-items: center; 
        }

        /* FORMULARIO GRID */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .span-2 { grid-column: span 2; }
        .field label { display: block; font-size: 10px; font-weight: 700; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; }
        
        input, select { 
            width: 100%; padding: 10px 10px 10px 32px; border: 1.5px solid var(--border);
            border-radius: var(--radius-md); font-size: 13px; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--primary); background: var(--white); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.08); }
        input:disabled { background: #f8fafc; cursor: not-allowed; opacity: 0.7; }

        /* CURSOS */
        .course-flex { display: flex; gap: 8px; }
        .btn-sq { width: 40px; height: 40px; border-radius: 10px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-info { background: white; border: 1.5px solid var(--border); color: var(--primary); }
        .btn-add { background: var(--primary); color: white; }
        .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .tag { background: var(--primary); color: white; padding: 6px 12px; border-radius: 8px; font-size: 11px; display: flex; align-items: center; gap: 8px; }

        /* SECCIÓN REPRESENTANTE (COLAPSABLE) */
        #rep-section { 
            grid-column: span 2; background: #f8fafc; border-radius: 16px; 
            max-height: 0; overflow: hidden; opacity: 0; transition: 0.4s ease; 
        }
        #rep-section.active { max-height: 500px; opacity: 1; padding: 15px; border: 1px solid var(--border); margin-top: 10px; }

        /* FOOTER Y BOTONES */
        footer { padding: 15px 20px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 10px 20px; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        
        .btn-close { background: #cc9a9a29; color: #ef4444; }
        .btn-close:hover { background: #fef2f2; transform: translateY(-1px); }
        
        .btn-clear { background: #b7b7b72b; color: var(--text-muted); }
        .btn-clear:hover { background: #f1f5f9; color: var(--primary); transform: translateY(-1px); }

        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(79, 70, 229, 0.3); }
        .btn-primary:disabled { background: #cbd5e1; cursor: not-allowed; box-shadow: none; }

        /* SWITCH */
        .switch { position: relative; width: 36px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #cbd5e1; border-radius: 20px; transition: .3s; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .3s; }
        input:checked + .slider { background: var(--success); }
        input:checked + .slider:before { transform: translateX(16px); }

        /* NOTIFICACIÓN */
        .top-notification { 
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%); 
            background: white; padding: 15px 25px; border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-left: 5px solid var(--success);
            display: flex; align-items: center; gap: 15px; transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 10001; 
        }
        .top-notification.show { top: 20px; }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="loader-spin"></div>
        <p style="font-size: 10px; margin-top: 10px; font-weight: 700; color: var(--text-muted); letter-spacing: 1px;">SAIA ECOSYSTEM - CARGANDO</p>
    </div>

    <div class="app-container">
        <header>
            <h1><i class="icon-user-check"></i> Actualizar Estudiante</h1>
            <div id="status-dot" style="width: 8px; height: 8px; border-radius: 50%; background: #cbd5e1;"></div>
        </header>

        <div class="main-content">
            <form id="registrationForm">
                <div class="hero-section">
                    <div class="avatar-container" id="uploadTrigger" title="Cambiar fotografía">
                        <img id="imagen-avatar" src="../assets/imagen/ImageLogin3.png">
                        <div class="avatar-overlay"><i class="icon-camera"></i></div>
                    </div>

                    <div class="toggle-card">
                        <div>
                            <b style="font-size: 14px; display: block; color: var(--primary);">Estudiante Menor</b>
                            <span style="font-size: 11px; color: var(--text-muted);">Requiere Representante Legal</span>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="ageToggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="field span-2">
                        <label>Nombre Completo</label>
                        <div class="input-group" id="load-nombre">
                            <i class="icon-user"></i>
                            <input type="text" id="nombre" placeholder="Nombres y Apellidos">
                            <div class="field-loader"></div>
                        </div>
                    </div>

                    <div class="field">
                        <label>Cédula</label>
                        <div class="input-group" id="load-cedula">
                            <i class="icon-address-card"></i>
                            <input type="text" id="cedula" maxlength="10">
                            <div class="field-loader"></div>
                        </div>
                    </div>

                    <div class="field">
                        <label>Edad</label>
                        <div class="input-group" id="load-edad">
                            <i class="icon-star-full"></i>
                            <input type="number" id="edad">
                            <div class="field-loader"></div>
                        </div>
                    </div>

                    <div class="field">
                        <label>F. Nacimiento</label>
                        <div class="input-group" id="load-fechanacimiento">
                            <i class="icon-calendar"></i>
                            <input type="date" id="fechanacimiento">
                            <div class="field-loader"></div>
                        </div>
                    </div>

                    <div class="field">
                        <label>Teléfono</label>
                        <div class="input-group" id="load-telefono">
                            <i class="icon-phone"></i>
                            <input type="tel" id="telefono">
                            <div class="field-loader"></div>
                        </div>
                    </div>

                    <div class="field span-2">
                        <label>Dirección</label>
                        <div class="input-group" id="load-direccion">
                            <i class="icon-location"></i>
                            <input type="text" id="direccion">
                            <div class="field-loader"></div>
                        </div>
                    </div>

                    <div class="field span-2">
                        <label>Correo Electrónico</label>
                        <div class="input-group" id="load-correo">
                            <i class="icon-envelop"></i>
                            <input type="email" id="correo">
                            <div class="field-loader"></div>
                        </div>
                    </div>

                    <div class="field span-2">
                        <label>Cursos Inscritos</label>
                        <div class="course-flex">
                            <div class="input-group" id="load-tipoCurso" style="flex:1">
                                <i class="icon-books"></i>
                                <select id="tipoCurso"></select>
                                <div class="field-loader"></div>
                            </div>
                            <button type="button" class="btn-sq btn-info icon-info" id="info-course-student" disabled></button>
                            <button type="button" class="btn-sq btn-add icon-plus" id="btnAddCourse"></button>
                        </div>
                        <div class="tags" id="selected-courses-container"></div>
                    </div>

                    <div id="rep-section">
                        <p style="font-size: 10px; font-weight: 800; color: var(--primary); margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px;">REPRESENTANTE LEGAL</p>
                        <div class="form-grid">
                            <div class="field span-2">
                                <label>Nombre Representante</label>
                                <div class="input-group" id="load-nombre_representante">
                                    <i class="icon-users"></i>
                                    <input type="text" id="nombre_representante" class="rep-field">
                                    <div class="field-loader"></div>
                                </div>
                            </div>
                            <div class="field">
                                <label>Cédula Rep.</label>
                                <div class="input-group" id="load-cedula_representante">
                                    <i class="icon-credit-card"></i>
                                    <input type="text" id="cedula_representante" class="rep-field" required oninput="this.value = this.value.replace(/[^0-9]/g, '')" placeholder="0900000000" >
                                    <div class="field-loader"></div>
                                </div>
                            </div>
                            <div class="field">
                                <label>Teléfono Rep.</label>
                                <div class="input-group" id="load-telefono_representante">
                                    <i class="icon-mobile"></i>
                                    <input type="tel" id="telefono_representante" class="rep-field"required oninput="this.value = this.value.replace(/[^0-9]/g, '')" placeholder="0900000000" >
                                    <div class="field-loader"></div>
                                </div>
                            </div>
                            <div class="field span-2">
                                <label>Correo Representante</label>
                                <div class="input-group" id="load-correo_representante">
                                    <i class="icon-envelop"></i>
                                    <input type="email" id="correo_representante" class="rep-field">
                                    <div class="field-loader"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <footer>
            <button class="btn btn-close" id="btn-close"><i class="icon-cross"></i> Cerrar</button>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-clear" id="btn-clear"><i class="icon-undo2"></i> Limpiar</button>
                <button class="btn btn-primary" id="btn-confirm" disabled>Actualizar Datos <i class="icon-checkmark"></i></button>
            </div>
        </footer>
    </div>

    <div class="top-notification" id="topNotif">
        <i class="icon-checkmark" style="color: var(--success); font-size: 24px;"></i>
        <div>
            <b style="font-size: 14px; display: block;">¡Cambios Guardados!</b>
            <span style="font-size: 11px; color: var(--text-muted);">La ficha del estudiante ha sido actualizada.</span>
        </div>
    </div>

    <script>
        let seleccionCursos = [];
        let Key = null;
        const ageToggle = document.getElementById('ageToggle');
        const repSection = document.getElementById('rep-section');
        const repFields = document.querySelectorAll('.rep-field');
        const btnConfirm = document.getElementById('btn-confirm');
        const mainAvatar = document.getElementById('imagen-avatar');
        const coursesContainer = document.getElementById('selected-courses-container');
        const selectCurso = document.getElementById("tipoCurso");

        // Preloader por campo
        function setLoading(fieldId, state) {
            const el = document.getElementById(`load-${fieldId}`);
            if (el) state ? el.classList.add('loading') : el.classList.remove('loading');
        }

        window.onload = () => {
            api.send("Get-data-student-update");
            validateForm();
        };

        api.receive('data-student-information', (event, data) => {
            Key = data.Key;
            document.getElementById('nombre').value = data.Name || "";
            document.getElementById('cedula').value = data.Cod_id || "";
            document.getElementById('edad').value = data.Age || "";
            mainAvatar.src = data.Image || "../assets/imagen/ImageLogin3.png";
            document.getElementById('fechanacimiento').value = data.Birthdate || "";
            document.getElementById('direccion').value = data.Address || "";
            document.getElementById('correo').value = data.E_mail || "";
            document.getElementById('telefono').value = data.Tlf || "";

            // Datos Representante
            document.getElementById('nombre_representante').value = data.Name_Representative || "";
            document.getElementById('cedula_representante').value = data.Cod_id_Representative || "";
            document.getElementById('telefono_representante').value = data.Tlf_Representative || "";
            document.getElementById('correo_representante').value = data.E_mail_Representative || "";

            if (data.Name_Representative && data.Name_Representative.trim() !== "") {
                ageToggle.checked = true;
                repSection.classList.add('active');
                repFields.forEach(f => f.disabled = false);
            }

            if (data.cursos) {
                seleccionCursos = data.cursos.map(c => ({ id: c.id, nombre: c.name }));
                renderCourses();
            }

            api.send("Get-data-list-course-student-update");
            validateForm();
            
            // Ocultar preloader global
            document.getElementById('preloader').style.opacity = '0';
            setTimeout(() => document.getElementById('preloader').style.display = 'none', 500);
        });

        api.receive('data-list-course-student-update', (event, info) => {
            selectCurso.innerHTML = '<option value="" disabled selected>Seleccione un curso...</option>';
            info.data.forEach(curso => {
                if(!seleccionCursos.find(c => c.id == curso.Key)) {
                    selectCurso.innerHTML += `<option value="${curso.Key}">${curso.Name}</option>`;
                }
            });
        });

        // Lógica de UI para Representante
        ageToggle.addEventListener('change', function() {
            repSection.classList.toggle('active', this.checked);
            repFields.forEach(f => {
                f.disabled = !this.checked;
                if (!this.checked) f.value = "";
            });
            validateForm();
        });

        // Cursos
        document.getElementById("btnAddCourse").addEventListener("click", () => {
            const val = selectCurso.value;
            const text = selectCurso.options[selectCurso.selectedIndex].text;
            if (val && !seleccionCursos.find(c => c.id === val)) {
                seleccionCursos.push({ id: val, nombre: text });
                renderCourses();
                validateForm();
                selectCurso.value = "";
            }
        });

        function renderCourses() {
            coursesContainer.innerHTML = seleccionCursos.length === 0 ? 
                `<span style="color: var(--text-muted); font-size: 0.8rem;">Sin cursos</span>` : "";
            seleccionCursos.forEach(c => {
                const tag = document.createElement("div");
                tag.className = "tag";
                tag.innerHTML = `${c.nombre} <i class="icon-cross" style="cursor:pointer" onclick="removeCourse('${c.id}')"></i>`;
                coursesContainer.appendChild(tag);
            });
        }

        window.removeCourse = (id) => {
            seleccionCursos = seleccionCursos.filter(c => c.id !== id);
            renderCourses();
            validateForm();
        };

        // Validación
        function validateForm() {
            const fields = ['nombre', 'cedula', 'edad', 'fechanacimiento', 'direccion', 'correo', 'telefono'];
            let valid = fields.every(id => document.getElementById(id).value.trim() !== "");
            if (seleccionCursos.length === 0) valid = false;
            if (ageToggle.checked) {
                const repValid = ['nombre_representante', 'cedula_representante', 'telefono_representante'].every(id => document.getElementById(id).value.trim() !== "");
                if(!repValid) valid = false;
            }
            btnConfirm.disabled = !valid;
            document.getElementById('status-dot').style.background = valid ? 'var(--success)' : '#f59e0b';
        }

        document.querySelectorAll('input').forEach(i => i.addEventListener('input', validateForm));

        // Enviar
        btnConfirm.addEventListener('click', () => {
            setLoading('nombre', true);
            const formData = {
                key: Key,
                estudiante: {
                    esMenor: ageToggle.checked,
                    nombre: document.getElementById('nombre').value,
                    cedula: document.getElementById('cedula').value,
                    edad: document.getElementById('edad').value,
                    imagen: mainAvatar.src,
                    nacimiento: document.getElementById('fechanacimiento').value,
                    direccion: document.getElementById('direccion').value,
                    cursos: seleccionCursos.map(c => c.id),
                    correo: document.getElementById('correo').value,
                    telefono: document.getElementById('telefono').value
                },
                representante: ageToggle.checked ? {
                    nombre: document.getElementById('nombre_representante').value,
                    cedula: document.getElementById('cedula_representante').value,
                    telefono: document.getElementById('telefono_representante').value,
                    correo: document.getElementById('correo_representante').value
                } : null
            };
            api.send("Register-update-data-student", formData);
            api.send("Reload-dasboard-system-data-Student");
        });

        api.receive("Open-modal-message-student-update", () => {
            setLoading('nombre', false);
            const notif = document.getElementById('topNotif');
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 3500);
        });

        document.getElementById("uploadTrigger").addEventListener("click", () => api.send("select-Image-new-student-update"));
        api.receive('Image-select-new-student-update', (e, img) => { mainAvatar.src = img; validateForm(); });
        document.getElementById("btn-close").addEventListener("click", () => window.close());
        document.getElementById("btn-clear").addEventListener("click", () => location.reload());
    </script>
</body>
</html>
