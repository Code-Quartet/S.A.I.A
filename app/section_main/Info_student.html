<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil SAIA v2 - Optimizado</title>
    <link rel="stylesheet" type="text/css" href="../assets/iconos/icomoon/style.css">
    <style>
 

@font-face {
    font-family: 'Inter';
    src: url('../assets/fonts/Inter/Inter-VariableFont_opszwght.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}

        :root {
            --blue-main: #1a73e8;
            --red-main: #d93025;
            --text-dark: #202124;
            --text-gray: #5f6368;
            --bg-light: #f8f9fa;
            --border-color: #dadce0;
        }

body {
   font-family: 'Inter';
    background-color: #ffffff;
    margin: 0;
    display: flex;
    justify-content: center;
}

/*
.card {
    background: white;
    width: 100%;
    max-width: 600px;
    padding: 6px;
    height: 100vh;
    box-sizing: border-box;
    display: none;

.card {
    background: white;
    width: 100%;
    max-width: 600px;
    padding: 12px;
    height: 100vh;
    box-sizing: border-box;
    display: none;
    grid-template-columns: repeat(1, 1fr);
    grid-template-rows: 153px 130px 125px 53px;
    grid-column-gap: 0px;
    grid-row-gap: 0px;
}

        .profile-header {
            display: flex;
            gap: 25px;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid var(--border-color);
        }

        .section-container { margin-bottom: 25px; }
        
        .section-title {
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--blue-main);
            text-transform: uppercase;
            margin-bottom: 12px;
            display: block;
            border-left: 4px solid var(--blue-main);
            padding-left: 10px;
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            background: var(--bg-light);
            padding: 15px;
            border-radius: 8px;
        }

        .info-item { font-size: 0.9rem; color: var(--text-gray); }
        .info-item strong { color: var(--text-dark); }

        .courses-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 10px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }

        .grid-head { font-weight: bold; font-size: 0.8rem; color: var(--text-gray); }
        
        .status-pill {
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            background: #e8f0fe;
            color: var(--blue-main);
            font-weight: bold;
        }

        .actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 600;
        }

        .btn-delete { border: 1.5px solid var(--red-main); color: var(--red-main); background: white; }
        
        /* Ocultar secciones dinámicamente */
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <header class="profile-header">
            <img id="view-img" src="" alt="Perfil" class="profile-img">
            <div class="info-group">
                <h2 id="view-name" style="margin:0">---</h2>
                <div class="info-item"><strong>ID:</strong> <span id="view-id"></span></div>
                <div class="info-item"><strong>Edad:</strong> <span id="view-age"></span> años</div>
                <div class="info-item"><strong>Ubicación:</strong> <span id="view-address"></span></div>
            </div>
        </header>

        <div class="section-container"  >
            <span class="section-title">Información del Representante</span>
            <div class="data-grid" id="rep-section">
                <div class="info-item"><strong>Nombre:</strong> <span id="rep-name"></span></div>
                <div class="info-item"><strong>Cédula:</strong> <span id="rep-id"></span></div>
                <div class="info-item"><strong>Teléfono:</strong> <span id="rep-tlf"></span></div>
                <div class="info-item"><strong>Correo:</strong> <span id="rep-email"></span></div>
            </div>
        </div>

        <div class="section-container">
            <span class="section-title">Cursos e Inscripción</span>
            <div class="courses-grid">
                <div class="grid-head">Curso</div>
                <div class="grid-head">Fecha</div>
                <div class="grid-head">Estado</div>

                <div class="grid-cell" id="view-course">---</div>
                <div class="grid-cell" id="view-date">---</div>
                <div class="grid-cell"><span class="status-pill">Inscrito</span></div>
            </div>
        </div>

        <footer class="actions">
            <button class="btn btn-delete" id="btn-close">
                <i class="icon-trash"></i>Cerrar
            </button>
        </footer>
    </div>

    <script>
        const btnClose = document.getElementById("btn-close");
        const mainCard = document.getElementById("main-card");

        // Elementos del DOM para mapear datos
        const fields = {
            name: document.getElementById('view-name'),
            id: document.getElementById('view-id'),
            age: document.getElementById('view-age'),
            address: document.getElementById('view-address'),
            img: document.getElementById('view-img'),
            course: document.getElementById('view-course'),
            date: document.getElementById('view-date'),
            // Representante
            repSection: document.getElementById('rep-section'),
            repName: document.getElementById('rep-name'),
            repId: document.getElementById('rep-id'),
            repTlf: document.getElementById('rep-tlf'),
            repEmail: document.getElementById('rep-email')
        };

        function updateUI(data) {
            // Datos básicos
            fields.name.textContent = data.Name;
            fields.id.textContent = data.Cod_id;
            fields.age.textContent = data.Age;
            fields.address.textContent = data.Address;
            fields.course.textContent = data.CourseName ? data.CourseName.replace('┬║', '') : 'N/A';
            fields.date.textContent = data.Date;
            
            // Imagen con fallback
            fields.img.src = data.Image || 'default-avatar.png';
            fields.img.onerror = () => { fields.img.src = 'default-avatar.png'; };

            // Lógica del representante
            if (data.Name_Representative) {
                //fields.repSection.classList.remove('hidden');
                fields.repName.textContent = data.Name_Representative;
                fields.repId.textContent = data.Cod_id_Representative || 'N/A';
                fields.repTlf.textContent = data.Tlf_Representative || 'N/A';
                fields.repEmail.textContent = data.E_mail_Representative || 'N/A';
            } else {
                fields.repSection.classList.add('hidden');
            }

            // Mostrar la tarjeta una vez procesada
            mainCard.style.display = 'grid';
        }

        // Eventos de Electron
        window.onload = () => {
            if (typeof api !== 'undefined') {
                api.send("Get-data-student-info");
            }
        };

        if (typeof api !== 'undefined') {
            api.receive("data-student-information", (event, data) => {
                updateUI(data);
            });
        }

        btnClose.addEventListener("click", () => {
            window.close();
        });
    </script>
</body>
</html>
