<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar Empleado - SAIA v2</title>
    <link rel="stylesheet" type="text/css" href="../assets/iconos/icomoon/style.css">
<style type="text/css">
        :root {
            --primary-blue: #2b56c5;
            --text-main: #374151;
            --text-muted: #9ca3af;
            --border-color: #d1d5db;
            --bg-light: #ffffff;
            --bg-disabled: #f3f4f6;
            --danger-red: #ef4444;
            --danger: #ef4444;
            --success: #28a745;
        }

        /*--------ESTRUCTURA-----------------*/
        .container-new-registre {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 47px auto 61px;
            height: 92vh;
        }

        .container-title-register {
            display: flex;
            align-items: center;
        }

        .container-registration-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 0px;
            margin-left: 20px;
        }

        .action-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-right: 13px;
            padding: 10px;
        }

        /*--------------------STYLE TOGGLE SWITCH---------------*/
        .container-toogle-swicht {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .label-title {
            font-weight: bold;
            color: #333;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 70px;
            height: 30px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #d8d8d8;
            transition: .4s;
            border-radius: 34px;
        }

        .knob {
            position: absolute;
            height: 22px;
            width: 22px;
            left: 4px;
            top: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            font-weight: bold;
            color: #333;
        }

        input:checked + .slider {
            background-color: #60b8ff;
        }

        input:checked + .slider .knob {
            transform: translateX(40px);
        }

        /*----------------INPUT STYLE-------------------------*/
        .form-group {
            margin-bottom: 6px;
        }
        .form-group > label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
        }

        .form-group > input, .select-input-new-registre {
            width: 80%;
            padding: 10px;
            border: 1.5px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
        }

        .form-group > input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 5px rgba(43, 86, 197, 0.2);
        }

        input:disabled, select:disabled {
            background-color: var(--bg-disabled);
            cursor: not-allowed;
            color: var(--text-muted);
        }

        .sub-group-data-personal, .container-tlf-email, .sub-container-representante-tlf-email {
            display: flex;
            gap: 10px;
            align-items: center;
            width: 85%;
        }

        .sub-group-data-personal > div, .container-tlf-email > div, .sub-container-representante-tlf-email > div {
            flex: 1; 
        }

        .btn-info-course {
            width: 30px;
            height: 30px;
            color: blue;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 1.2rem;
        }

        /*-----------------IMAGE UPLOAD------------------------------*/
        .file-upload-container-new-registre {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

.image-uploader-register-studient {
    position: relative;
    width: 171px;
    height: 169px;
    cursor: pointer;
    background: #d8d8d8;
    border-radius: 97px;
    padding: 7px;
    display: flex;
    align-items: center;

}

        .main-circle-register-studient {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #e5e7eb;
            overflow: hidden;
            border: 2px solid var(--border-color);
        }

.avatar-main-register {
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: blue;
     pointer-events: none;
}

.camera-button-register-studient {
    position: absolute;
    bottom: 4px;
    right: 12px;
    width: 35px;
    height: 35px;
    background-color: #d7d7d7;
    border-radius: 50%;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    border: 2px solid white;
}

        /*-----------------BUTTONS--------------------*/
        .btn-confirm {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-confirm:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.7;
        }

        .btn-clear {
            background-color: transparent;
            color: var(--text-main);
            border: 1.5px solid var(--border-color);
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-right: 10px;
        }

        .btn-clear:hover {
            background-color: #fceaea;
            border-color: var(--danger-red);
            color: var(--danger-red);
        }

        /*--------------NOTIFICACION---------------------*/

      /* --- Notification --- */
.top-notification {
    position: fixed;
    top: 20px;
    right: -400px;
    background: white;
    padding: 4px 2px;
    border-radius: 10px;
    border-left: 5px solid var(--success);
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.5s;
    display: flex;
    align-items: center;
    gap: 15px;
    z-index: 9999;
}
        .top-notification.show { right: 20px; }
        .icono-message { color: var(--success); font-size: 1.5rem; }
</style>
<body>
    <div class="container-new-registre">
        <div class="container-title-register">
         <h1 class="titleRegister" style=" margin-left: 11px; ">Nueva Estudiante</h1>
        </div>
        <form class="container-registration-form" id="registrationForm">
            <div class="columns column1">
                <div class="form-group">
                    <div class="container-toogle-swicht">
                        <label class="label-title">¿Es menor de edad?</label>
                        <label class="toggle-switch">
                            <input type="checkbox" id="ageToggle">
                            <div class="slider">
                                <div class="knob" id="text-toggle">No</div>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="nombre" placeholder="Ej: Rosa María Pérez Gonzales" required>
                </div>

                <div class="sub-group-data-personal">
                    <div class="form-group">
                        <label>Cédula</label>
                        <input type="text" id="cedula" placeholder="Ej: 21783921" required  oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    </div>
                    <div class="form-group">
                        <label>Edad</label>
                        <input type="number" id="edad" min="0" placeholder="Ej: 20" required>
                    </div>
                    <div class="form-group">
                        <label>Nacimiento</label>
                        <input type="date" id="fechanacimiento" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Dirección</label>
                    <input type="text" id="direccion" placeholder="Dirección completa" required>
                </div>

                <div class="container-tlf-email">
                    <div class="form-group">
                        <label>Correo Electrónico</label>
                        <input type="email" 
                        id="correo" 
                        placeholder="nombre@correo.com"
                        autocomplete="email" 
                        spellcheck="false"  
                        required>
                    </div>
                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="tel" id="telefono" placeholder="04163003485"  oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
                    </div>
                </div>


                <!---------------------------------->
                <div class="sub-group-data-course">
                    <div class="form-group" style="width: 91%; "> <label>Curso</label>
                    <select class="select-input-new-registre" id="tipoCurso" required="" style="width: 83%;"></select>
                    <button class="btn-info-course icon-info" id="info-course-student"></button>
                    </div>
                </div>
                <!---------------------------------->

            </div>

            <div class="columns column2">
                <div class="file-upload-container-new-registre">
                    <div class="image-uploader-register-studient">
                        <div class="main-circle-register-studient">
                            <img id="imagen-avatar" class="avatar-main-register" src="../assets/imagen/ImageLogin3.png" alt="Avatar">
                        </div>
                        <button class="camera-button-register-studient" id="Btn_select_image_student">
                           <span class="icon-camera"></span>
                        </button> 
                    </div>
                </div>

                <div class="form-group">
                    <label>Nombre del Representante</label>
                    <input type="text" id="nombre_representante" class="rep-field" placeholder="Nombre completo" disabled>
                </div>

                <div class="form-group">
                    <label>Cédula del Representante</label>
                    <input type="text" id="cedula_representante" class="rep-field" placeholder="Cédula" disabled>
                </div>

                <div class="sub-container-representante-tlf-email">
                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="tel" id="telefono_representante" class="rep-field" placeholder="Teléfono"  oninput="this.value = this.value.replace(/[^0-9]/g, '')" disabled>
                    </div>
                    <div class="form-group">
                        <label>Correo Electrónico</label>
                        <input type="email" id="correo_representante" class="rep-field" placeholder="correo@ejemplo.com"  oninput="this.value = this.value.replace(/[^0-9]/g, '')" disabled>
                    </div>
                </div>
            </div>
        </form>
        <div class="action-footer">
            <div>
                <button type="button" class="btn-clear" id="btn-close">Cerrar</button>
            </div>
            <div style="display: flex">
                <button type="button" class="btn-clear" id="btn-clear">Limpiar</button>
                <button type="submit" class="btn-confirm" id="btn-confirm" disabled>
                    Confirmar <span class="icon-checkmark"></span>
                </button>
            </div>
        </div>
    </div>
    <!---------------------------------------------------->
    <div class="top-notification" id="topNotif">
            <span class="contain-icono-message">
                <span class="icon-checkmark icono-message">
                </span>
            </span>
            <h3>¡Inscripción guardada!</h3>
    </div>
</body>
<script type="text/javascript">
    
window.onload = function() {
    api.send("Get-data-list-course-student");
    validateForm(); // Validar al iniciar para asegurar que el botón esté deshabilitado
}

/*--- CARGA DE CURSOS ---*/
api.receive('data-list-course-student', async (event, info) => {

    
    const select = document.getElementById("tipoCurso");
    select.innerHTML = `<option value="" disabled selected>Seleccione un Curso</option>`;

    info.data.forEach((curso) => {
        const option = document.createElement('option');
        option.value = curso.Key;
        option.textContent = curso.Name;
        select.appendChild(option);
    });
});

/*--- VARIABLES DE CONTROL ---*/
const ageToggle = document.getElementById('ageToggle');
const btnConfirm = document.getElementById('btn-confirm');
const btnClear = document.getElementById('btn-clear');
const textToggle = document.getElementById('text-toggle');
const repFields = document.querySelectorAll('.rep-field');
const registrationForm = document.getElementById('registrationForm');

/*--- MANEJO DE IMAGEN ---*/
document.getElementById("Btn_select_image_student").addEventListener("click", (e) => {
    e.preventDefault(); // Evitar comportamientos por defecto
    api.send("select-Image-new-student");
});

api.receive('Image-select-new-student', async (event, imagen) => {
    document.getElementById("imagen-avatar").src = imagen;
});

/*--- VALIDACIÓN DINÁMICA ---*/
function validateForm() {
    let isFormValid = true;
    
    // Campos obligatorios del estudiante
    const studentRequiredIds = ['nombre', 'cedula', 'edad', 'fechanacimiento', 'direccion', 'tipoCurso', 'correo', 'telefono'];
    
    studentRequiredIds.forEach(id => {
        const input = document.getElementById(id);
        if (!input || !input.value.trim()) {
            isFormValid = false;
        }
    });

    // Validar campos del representante solo si es menor de edad
    if (ageToggle.checked) {
        repFields.forEach(field => {
            if (!field.value.trim()) {
                isFormValid = false;
            }
        });
    }

    btnConfirm.disabled = !isFormValid;
}

/*--- LIMPIAR FORMULARIO ---*/
function LimpiarForm() {
    registrationForm.reset();
    
    // Reset visual del toggle
    ageToggle.checked = false;
    textToggle.innerHTML = 'No';
    
    // Deshabilitar campos de representante
    repFields.forEach(field => {
        field.disabled = true;
        field.value = "";
    });

    // Reset de imagen (opcional, vuelve a la default)
    document.getElementById("imagen-avatar").src = "../assets/imagen/ImageLogin3.png";

    validateForm();
}

/*--- ENVIAR DATOS ---*/
btnConfirm.addEventListener('click', (e) => {
    e.preventDefault(); // Importante: evita que el formulario intente hacer un submit tradicional

    const formData = {
        estudiante: {
            esMenor: ageToggle.checked,
            nombre: document.getElementById('nombre').value,
            cedula: document.getElementById('cedula').value,
            edad: document.getElementById('edad').value,
            imagen: document.getElementById('imagen-avatar').src,
            nacimiento: document.getElementById('fechanacimiento').value,
            direccion: document.getElementById('direccion').value,
            curso: document.getElementById('tipoCurso').value,
            correo: document.getElementById('correo').value,
            telefono: document.getElementById('telefono').value
        },
        representante: ageToggle.checked ? {
            nombre: document.getElementById('nombre_representante').value,
            cedula: document.getElementById('cedula_representante').value,
            telefono: document.getElementById('telefono_representante').value,
            correo: document.getElementById('correo_representante').value
        } : null
    };

    console.log("Enviando:", formData);
    api.send("Register-new-data-student", formData);
    LimpiarForm();
     window.close();
    

     api.send("Reload-dasboard-system-data-Student")


});

/*--- EVENTOS DE ESCUCHA ---*/
ageToggle.addEventListener('change', function() {
    const isMinor = this.checked;
    textToggle.innerHTML = isMinor ? 'Sí' : 'No';
    repFields.forEach(field => {
        field.disabled = !isMinor;
        if (!isMinor) field.value = "";
    });
    validateForm();
});

// Escuchar cambios en TODOS los inputs para activar el botón Confirmar
const allInputs = document.querySelectorAll('#registrationForm input, #registrationForm select');
allInputs.forEach(input => {
    input.addEventListener('input', validateForm);
    input.addEventListener('change', validateForm);
});

btnClear.addEventListener('click', LimpiarForm);

document.getElementById("btn-close").addEventListener("click", () => {

 window.close();
    



});

/*--- NOTIFICACIONES ---*/
api.receive("Open-modal-message-student", (event, datas) => {
    mostrarNotificacion();
});

document.getElementById("info-course-student").addEventListener("click",(e) =>{
    
    let courseSelect = document.getElementById('tipoCurso').value
    api.send("Open-system-info-course-register",courseSelect)


})

function mostrarNotificacion() {
    const notif = document.getElementById('topNotif');
    notif.classList.add('show');
    ///setTimeout(cerrarNotificacion, 4000);
}

function cerrarNotificacion() {
    const notif = document.getElementById('topNotif');
    if(notif) notif.classList.remove('show');
}

</script>
</script>
</body>
</html>
