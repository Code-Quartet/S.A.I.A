    <div class="modal-card master-login">

            <!---------------------->  
            <div class="btn-group-master">

    <script>
        window.onload=function(){
            document.getElementById("input-password").focus();
        }
        document.getElementById("Ingresar").addEventListener("click",(event)=>{

                api.send("verify_master_password",document.getElementById("input-password").value)

        })

        document.getElementById("cerrar").addEventListener("click",(event)=>{
            
                window.close()
            
        })
        document.getElementById("input-password").focus();
        document.getElementById("input-password").addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                  api.send("verify_master_password",document.getElementById("input-password").value)

            }
        });
        api.receive("message-password-master",(event,data)=>{


       if(data.sms.success==true){
                console.log(sms.message)
                document.getElementById("lock-container").style.background = 'blue';
                document.getElementById("icon-lock").style.display="none";
                document.getElementById("icon-unlocked").style.color="white";
                document.getElementById("icon-unlocked").style.display="block";
                document.getElementById("sms").innerHTML = data.sms.message;
                document.getElementById("sms").style.color="blue";

                document.getElementById("sms").style.display = 'block';
                document.getElementById("container-pass").style.display = 'none';

                SelectAction(data.action,data.key)

                setTimeout(()=>{
                       window.close()
                },5000)

            }
            if(data.sms.success==false){
                console.log(sms.message)
                document.getElementById("lock-container").style.background = 'red';
                document.getElementById("icon-lock").style.display="block";
                document.getElementById("icon-unlocked").style.display="none";
                document.getElementById("icon-lock").style.color="white";
                document.getElementById("sms").innerHTML = data.sms.message;
                document.getElementById("sms").style.color="red";
    
                document.getElementById("sms").style.display = 'block';
                document.getElementById("container-pass").style.display = 'none';

                setTimeout(()=>{
                    document.getElementById("lock-container").style.background = "#dadada";
                        document.getElementById("sms").style.display = 'none';
                        document.getElementById("container-pass").style.display = 'block';
                        document.getElementById("icon-lock").style.display="block";
                        document.getElementById("icon-unlocked").style.display="none";
                        document.getElementById("icon-lock").style.color="black";
                },3000)
            }

function toggleVisibility(inputId, iconElement) {
    const input = document.getElementById(inputId);
    
    if (input.type === "password") {
        // Cambiar a texto para mostrar
        input.type = "text";
        // Cambiamos el icono a "ojo tachado" (ajusta la clase según tu pack de Icomoon)
        iconElement.classList.remove('icon-eye');
        iconElement.classList.add('icon-eye-blocked'); 
    } else {
        // Volver a password para ocultar
        input.type = "password";
        // Volver al icono original
        iconElement.classList.remove('icon-eye-blocked');
        iconElement.classList.add('icon-eye');
    }
}
