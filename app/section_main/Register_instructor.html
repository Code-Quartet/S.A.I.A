<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Instructor - SAIA</title>
    <link rel="stylesheet" href="css/icomoon.css">
    <style>
        :root {
            --primary-blue: #2546d1;
            --primary-hover: #1e3ab7;
            --border-color: #d1d5db;
            --text-main: #4b5563;
            --text-label: #374151;
            --bg-gray: #f3f4f6;
            --white: #ffffff;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #777; /* Fondo neutro para resaltar el modal */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* --- Contenedor Principal --- */
        .modal-card {
            background: var(--white);
            width: 100%;
            max-width: 580px;
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            position: relative;
        }

        .btn-close-x {
            position: absolute;
            right: 20px;
            top: 20px;
            background: #e5e7eb;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            color: #6b7280;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.6rem;
            color: #444;
            font-weight: 500;
        }

        /* --- Grid Layout --- */
        .form-container {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 12px 18px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-label);
        }

        .field input {
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .field input:focus {
            border-color: var(--primary-blue);
        }

        /* Span de Columnas */
        .col-12 { grid-column: span 12; }
        .col-9 { grid-column: span 9; }
        .col-8 { grid-column: span 8; }
        .col-6 { grid-column: span 6; }
        .col-4 { grid-column: span 4; }
        .col-3 { grid-column: span 3; }

        /* --- Input de Foto --- */
        .upload-group {
            display: flex;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            overflow: hidden;
            height: 42px;
        }

        .icon-thumb {
            background: #e5e7eb;
            width: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #9ca3af;
            font-size: 1.2rem;
        }

        .upload-group input {
            flex-grow: 1;
            border: none;
            background: transparent;
            color: #9ca3af;
        }

        .btn-blue-action {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 0 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* --- Select Personalizado --- */
        .custom-select {
            position: relative;
            cursor: pointer;
        }

        .select-box {
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: #9ca3af;
            background: var(--white);
            min-height: 42px;
            box-sizing: border-box;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 105%;
            left: 0;
            width: 100%;
            background: var(--white);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--shadow);
            z-index: 100;
            padding: 10px;
            box-sizing: border-box;
        }

        .dropdown-content.active { display: block; }

        .search-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 6px 12px;
            margin-bottom: 10px;
        }

        .search-wrapper input {
            border: none;
            width: 100%;
            margin-left: 10px;
            padding: 2px;
        }

        .options-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 150px;
            overflow-y: auto;
        }

        .options-list li {
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        .options-list li:hover {
            background: var(--bg-gray);
        }

        .btn-add-item {
            width: 100%;
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
            cursor: pointer;
        }

        /* --- Footer --- */
        .footer-buttons {
            grid-column: span 12;
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .btn-footer {
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }

        .btn-cancel {
            background: white;
            border: 1.5px solid var(--primary-blue);
            color: var(--primary-blue);
        }

        .btn-save {
            background: var(--primary-blue);
            border: none;
            color: white;
        }
    </style>
</head>
<body>

<div class="modal-card">
    <button class="btn-close-x"><span class="icon-cross"></span></button>
    
    <div class="modal-header">
        <h2>Nuevo Instructor</h2>
    </div>

    <form id="instructorForm" class="form-container">
        <div class="field col-9">
            <label>Nombre Completo</label>
            <input type="text" placeholder="Ej: Marina Paula Loza Mancha">
        </div>
        <div class="field col-3">
            <label>Edad</label>
            <input type="text" placeholder="Ej: 20">
        </div>

        <div class="field col-6">
            <label>Cedula</label>
            <input type="text" placeholder="Ej: 10.458.289">
        </div>
        <div class="field col-6">
            <label>Teléfono</label>
            <input type="text" placeholder="Ej: 0412-688-5749">
        </div>

        <div class="field col-6">
            <label>Correo Electrónico</label>
            <input type="email" placeholder="Ej: Maquillaje">
        </div>
        <div class="field col-6">
            <label>Dirección</label>
            <input type="text" placeholder="Ej: Calle 4 Av Pérez Casa #5">
        </div>

        <div class="field col-8">
            <label>Foto</label>
            <div class="upload-group">
                <div class="icon-thumb"><span class="icon-image"></span></div>
                <input type="text" readonly placeholder="Selecciona una imagen">
                <button type="button" class="btn-blue-action">Subir</button>
            </div>
        </div>
        <div class="field col-4">
            <label>Estado</label>
            <div class="custom-select">
                <div class="select-box">
                    <span>Seleccionar</span>
                    <span class="icon-chevron-down"></span>
                </div>
            </div>
        </div>

        <div class="field col-6">
            <label>Especialidad</label>
            <input type="text" placeholder="Ej: Manejo">
        </div>
        <div class="field col-6">
            <label>Cursos Asignados</label>
            <div class="custom-select" id="coursesDropdown">
                <div class="select-box" id="dropdownToggle">
                    <span id="labelValue">Seleccionar</span>
                    <span class="icon-chevron-down"></span>
                </div>
                
                <div class="dropdown-content" id="dropdownMenu">
                    <div class="search-wrapper">
                        <span class="icon-search"></span>
                        <input type="text" id="courseInput" placeholder="Buscar Cursos">
                    </div>
                    <ul class="options-list" id="listItems">
                        <li>Dibujo</li>
                        <li>Baile</li>
                        <li>Inglés</li>
                    </ul>
                    <button type="button" class="btn-add-item">Agregar Nuevo Curso</button>
                </div>
            </div>
        </div>

        <div class="field col-12">
            <label>Certificaciones</label>
            <input type="text" placeholder="Ej: Certificado de Conducción">
        </div>

        <div class="footer-buttons">
            <button type="button" class="btn-footer btn-cancel">
                Cancelar <span class="icon-cross"></span>
            </button>
            <button type="submit" class="btn-footer btn-save">
                Guardar <span class="icon-checkmark"></span>
            </button>
        </div>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const dropdown = document.getElementById('coursesDropdown');
        const toggle = document.getElementById('dropdownToggle');
        const menu = document.getElementById('dropdownMenu');
        const searchInput = document.getElementById('courseInput');
        const listItems = document.querySelectorAll('#listItems li');
        const labelValue = document.getElementById('labelValue');

        // Toggle menú
        toggle.addEventListener('click', () => {
            menu.classList.toggle('active');
        });

        // Selección de ítem
        listItems.forEach(item => {
            item.addEventListener('click', () => {
                labelValue.textContent = item.textContent;
                labelValue.style.color = "#333";
                menu.classList.remove('active');
            });
        });

        // Filtrado en tiempo real
        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            listItems.forEach(li => {
                const text = li.textContent.toLowerCase();
                li.style.display = text.includes(val) ? 'block' : 'none';
            });
        });

        // Cerrar al hacer click fuera
        document.addEventListener('click', (e) => {
            if (!dropdown.contains(e.target)) {
                menu.classList.remove('active');
            }
        });
    });
</script>

</body>
</html>
