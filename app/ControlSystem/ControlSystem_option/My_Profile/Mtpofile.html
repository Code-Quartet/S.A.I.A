}

/*-------------STYLE MODAL AVANCE OPTION---------------*/
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: none; /* Controlado por JS */
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--white);
            width: 550px;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: modalFadeIn 0.3s ease-out;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .modal-header h3 { margin: 0; color: var(--brand-blue); display: flex; align-items: center; gap: 10px; }

        .advanced-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .advanced-card {
            border: 1px solid var(--brand-light);
            border-radius: 16px;
            padding: 15px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .advanced-card:hover {
            border-color: var(--brand-blue);
            background: var(--brand-light);
            transform: translateY(-2px);
        }

        .card-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 18px;
        }

        .card-info h4 { margin: 0; font-size: 14px; color: var(--text-dark); }
        .card-info p { margin: 2px 0 0; font-size: 11px; color: var(--text-soft); }

        .close-btn {
            background: #f1f5f9;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .close-btn:hover { background: #fee2e2; color: #ef4444; }

    <script type="text/javascript">
    	/*----------------------*/
    	     // Elementos del DOM
        const modal = document.getElementById('modalConfig');
        const btnOpen = document.getElementById('openModalBtn');

        // Función para mostrar/ocultar contraseña
        function toggleView(id, icon) {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("icon-eye", "icon-eye-blocked");
            } else {
                input.type = "password";
                icon.classList.replace("icon-eye-blocked", "icon-eye");
            }
        }

        // Abrir Modal
        btnOpen.addEventListener('click', () => {
            modal.style.display = 'flex';
        });

        // Cerrar Modal
        function closeAdvanced() {
            modal.style.display = 'none';
        }

        // Cerrar si se hace clic fuera del modal
        window.addEventListener('click', (e) => {
            if (e.target === modal) closeAdvanced();
        });
    	/*----------------------*/
    </script>
