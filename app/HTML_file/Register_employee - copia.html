<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Empleado - Modal</title>
    <link rel="stylesheet" type="text/css" href="../assets/iconos/icomoon/style.css">
    
    <style>
        /* --- Variables y Reset --- */
:root {
    --primary-blue: #2b56c5;
    --text-main: #374151;
    --text-muted: #9ca3af;
    --border-color: #d1d5db;
    --bg-light: #ffffff;
}



        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
/*------------------------------------*/
.body-employee{
    padding: 5px;
}
.grid-container-new-registre {
    display: grid;
    grid-template-columns: 1fr 1fr;
 
}

/* Sistema de Grid para dos columnas */
.grid-container-new-registre {
    display: grid;
    grid-template-columns: 1fr 1fr;
   /* background: purple;*/
    height: 100%;
    grid-column-gap: 7px;
}

.container-form-group {
    display: flex;
    flex-direction: row;
    align-items: center;
}

     .column1{
        /*background: orange;*/
     }
     .column2{
        /*background: pink;*/
     }


.sub-form-group{
    
}

.sub-form-group>input {
    padding: 12px 16px;
    border: 1.5px solid var(--border-color);
    border-radius: 12px;
    font-size: 0.95rem;
    outline: none;
    width: 73%;
}

.sub-form-group {
    font-weight: bold;
}

.form-group>label {
    display: block;
    font-weight: 600;
    margin-bottom: 0.2rem;
    font-size: 17px;
    margin-top: 0.4rem;
}

.form-group>input {
    width: 79%;
    padding: 12px 16px;
    border: 1.5px solid var(--border-color);
    border-radius: 12px;
    font-size: 0.95rem;
    outline: none;
    transition: border 0.2s;
    background-color: var(--bg-light);
}

.select-input-new-registre {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border-color);
    border-radius: 12px;
    font-size: 0.95rem;
    outline: none;
    transition: border 0.2s;
    background-color: var(--bg-light);
}

.form-group>input::placeholder {
    color: var(--text-muted);
}

.form-group>input:focus {
    border-color: var(--primary-blue);
}

/* Estilo para el Selector */
.select-wrapper {
    position: relative;
}

.select-input-new-registre{
    appearance: none; /* Quita la flecha por defecto */
    cursor: pointer;
    color: var(--text-muted);
}

.custom-arrow {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: var(--text-muted);
}

/* Contenedor de Carga de Archivo */
.file-upload-container-new-registre {
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1.5px solid var(--border-color);
    border-radius: 12px;
    /* padding: 8px 12px; */
    width: 99%;
    background-color: var(--bg-light);
}

.file-info {
    display: flex;
    align-items: center;
    gap: 12px;
}

.preview-box {
    width: 45px;
    height: 45px;
    background-color: #e5e7eb;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #9ca3af;
    font-size: 1.2rem;
}

.file-placeholder {
    color: var(--text-muted);
    font-size: 0.9rem;
}
/*-----------------------------------------------*/
/*-----------ESTRUCTURA DEL GESTOR PARA SUBIR IMAGEN------------------------*/
.profile-container {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 7px;
}


.image-uploader {
    position: relative;
    width: 135px;
    height: 126px;
    cursor: pointer;
}

/* Círculo con borde negro grueso */
.main-circle {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background-color: #d8d8d8;
    overflow: hidden;

}

/* Estilo de tu imagen específica */
.avatar-main {
    width: 100%;
    height: 100%;
    display: block;
    background: blue;
}

/* Botón de cámara superpuesto */
.camera-button {
    position: absolute;
    bottom: 5px;
    right: 5px;
    width: 40px;
    height: 40px;
    background-color: #d8d8d8;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    box-sizing: border-box;
    z-index: 2;
    border-style: none;
}

.btn-select-imagen {
    background: #ff00000f;
    border-style: none;
}

.icon-camera {
  font-size: 18px;
  color: #333;
}

.avatar-main-register {
    width: 100%;
    height: 100%;
    display: block;
    background: blue;
}
/*-----------ESTRUCTURA DEL GESTOR PARA SUBIR IMAGEN------------------------*/

/*------------------------------------------------------*/
.sub-container-password {
    border: 1.5px solid var(--border-color);
    border-radius: 12px;
    width: 99%;
    display: flex;
    justify-content: space-evenly;
    align-items: center;
    
}


#password {
    border-style: none;
    width: 66%;
    padding: 12px 16px;
    font-size: 0.95rem;
    outline: none;
    transition: border 0.2s;
    background-color: var(--bg-light);
}
#Mpassword{
    border-style: none;
    width: 66%;
    padding: 12px 16px;
    font-size: 0.95rem;
    outline: none;
    transition: border 0.2s;
    background-color: var(--bg-light);
}

#toggleBtn {
    background: #ff000000;
    font-size: 20px;
    border-style: none;
}
/*----------MODAL PASSWORD MASTER--------------*/

.footer-register-employee {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 18px;
}

.btn-modal {
    width: fit-content;
    color: white;
    padding: 10px 20px;
    font-size: 17px;
    border-radius: 9px;
    font-weight: bold;
}

.Register{
   background:white;
    color:green;
    border: 0.2px solid green;

}

.Register:hover{
     background:green;
    color:white;
    border: 0.2px solid white;
}

.Close{
    background:white;
    color:red;
    border: 0.2px solid red;
}
.Close:hover{
    background:red;
    color:white;
    border: 0.2px solid white;
}
/*---------------------------------------------*/
/* Botón disparador (estilo genérico) */
        /* Fondo del modalcategory */
        .modal-overlay-MasterPassword {
            display: none; /* Oculto inicialmente */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        /* Contenedor principal del modalMasterPassword*/
        .modal-content-MasterPassword {
            background-color: #ffffff;
            width: 90%;
            max-width: 500px;
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
            animation: fadeIn 0.3s ease;
        }
/*----------MODAL PASSWORD MASTER--------------*/
</style>

">
                </div>

    width: 90%;
">
                  </div>

                  <div class="form-group">
                      <label>Correo Electrónico</label>
                      <input id="correo" type="email" placeholder="Ej: nombre@correo.com" style="
    width: 90%;
">
                  </div>
              
            </div>

            <div class="column2">
                            <div class="form-group ContainerUploadImagen" >
                    <label>Foto</label>
                    <div class="file-upload-container-new-registre" style="border-style: none;">
                       <label class="image-uploader" for="fileInputregister">
                        <div class="main-circle">
                          <img id="imagen-avatar" class="avatar-main-register" src="../assets/imagen/ImageLogin3.png" alt="imagen-dasboard">
                        </div>
                        
                           <button class="camera-button" id="Btn_select_image_user" onclick="SelectImage()">
                            <span class="icon-camera"></span>
                           </button> 
                       
                      </label>
                    </div>
              </div>         
              <div class="form-group">
                    <label>Nombre de Usuario</label>
                   <input type="text" id="usuario" value="admin" placeholder="Rosa María Pérez Gonzales" style="
    width: 90%;
">
              </div>
              <div class="form-group">
                    <label>Contraseña</label>
                    <div class="sub-container-password">
                        <span  class="icon-lock"></span>   
                        <input  type="password" id="password"placeholder="Ingrese su Contraseña" value="123456789">
                        <button type="button" id="toggleBtn">
                          <span id="eyeIcon" class="icon-eye"></span>
                        </button>
                    </div>
              </div>
              <div class="form-group">
                    <label>Contraseña Maestra</label>
                    <div class="sub-container-password">
                        <span  class="icon-lock"></span>   
                        <input  type="password" id="Mpassword"placeholder="Ingrese su Contraseña" value="123456789">
                        <button type="button" id="toggleBtn">
                          <span id="eyeIcon" class="icon-eye"></span>
                        </button>
                    </div>
              </div>            
            </div>
            </div>
        <div class="footer-register-employee"> 
              <button class="btn-modal Close" id="CloseModal">Cerrar</button>
            <div>
              <button class="btn-modal Close" id="CloseModal">Limpiar</button>
              <button class="btn-modal Register" id="RegisterData" onclick="DatosRegistro()">Registrar</button>
            </div>
        </div>

        </div>
</body>
