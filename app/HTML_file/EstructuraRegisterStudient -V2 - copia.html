/*--------------------STYLE BUTON TOGLE---------------*/
.container-toogle-swicht {
    display: flex;
    flex-direction: row;
    align-items: center;
}

.label-title {
  font-weight: bold;
  color: #333;
}

/* Contenedor principal del switch */
.toggle-switch {
  position: relative;
  display: inline-block;
  width: 80px;
  height: 34px;
}

.toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

/* El fondo del slider (estilo combinado) */
.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: #d8d8d8; /* Gris base */
  transition: .4s;
  border-radius: 34px;
  
}

/* El círculo que se mueve (knob) */
.knob {
    position: absolute;
    height: 22px;
    width: 22px;
    left: 2px;
    top: 2px;
    padding: 4px;
    bottom: 3px;
    background-color: white;
    transition: .4s;
    border-radius: 50%;
    z-index: 2;
}
/* --- Posicionamiento de los textos SOBRE el selector --- */
.label-text {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  font-weight: bold;
  text-transform: uppercase;
  z-index: 3; /* Asegura que esté por encima de todo */
  pointer-events: none; /* Hace que el clic pase a través del texto */
  transition: .4s;
}

.option-no {
  right: 15px;
  color: #333;
}

.option-yes {
  left: 15px;
  color: #333;
  opacity: 0; /* Oculto por defecto */
}

/* --- Estados activos --- */

/* Cuando está marcado (Sí) */
input:checked + .slider {
    background-color: #60b8ff;
}

input:checked + .slider .knob {
  transform: translateX(46px);
}

/* Ajuste de color y visibilidad de los textos al activar */
input:checked ~ .option-yes {
  opacity: 1;
  color: white; /* Texto blanco sobre fondo verde */
}

input:checked ~ .option-no {
  opacity: 0;
}
