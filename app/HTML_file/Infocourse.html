<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.A.I.A - Detalle del Curso</title>
    <style>
        /* VARIABLES Y RESET */
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #22c55e;
            --danger: #ef4444;
        }

        body {
            background-color: var(--bg-body);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* CONTENEDOR PRINCIPAL (CARD) */
        .course-card {
            background: var(--bg-card);
            width: 100%;
            max-width: 550px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        /* HEADER (FLEXBOX) */
        .course-header {
            background: #f8fafc;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
        }

        .course-title-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-box {
            background: var(--primary);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
        }

        .course-header h2 {
            margin: 0;
            font-size: 1.25rem;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-badge.active { background: #dcfce7; color: #166534; }

        /* CUERPO DE INFORMACIÓN (GRID) */
        .course-body {
            padding: 20px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .info-item label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 5px;
        }

        .info-item p {
            margin: 0;
            font-size: 0.95rem;
            color: var(--text-main);
            font-weight: 600;
        }

        .cost-highlight {
            color: var(--primary);
            font-size: 1.1rem !important;
        }

        /* SECCIÓN DE DESCRIPCIÓN */
        .description-box {
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
            margin-bottom: 20px;
        }

        .description-box label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .description-box p {
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text-main);
            margin: 0;
        }

        /* ETIQUETAS DE CARACTERÍSTICAS (FLEXBOX) */
        .features-container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .feature-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            background: #f1f5f9;
            color: var(--text-muted);
            border: 1px solid transparent;
        }

        .feature-tag.enabled {
            background: #eff6ff;
            color: var(--primary);
            border-color: #bfdbfe;
        }

        /* FOOTER DE ACCIONES */
        .course-footer {
            background: #f8fafc;
            padding: 15px 20px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            border-top: 1px solid var(--border-color);
        }

        .btn {
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-edit { background: var(--primary); color: white; }
        .btn-edit:hover { background: var(--primary-dark); }

        .btn-delete { background: #fee2e2; color: var(--danger); }
        .btn-delete:hover { background: #fecaca; }

    </style>
</head>
<body>

    <div class="course-card">
        <header class="course-header">
            <div class="course-title-section">
                <div class="icon-box">
                    <span class="icon-book"></span> </div>
                <h2 id="view-name">Cargando curso...</h2>
            </div>
            <span class="status-badge active" id="view-status">Activo</span>
        </header>

        <div class="course-body">
            <div class="info-grid">
                <div class="info-item">
                    <label><span class="icon-user"></span> Instructor</label>
                    <p id="view-instructor">---</p>
                </div>
                <div class="info-item">
                    <label><span class="icon-calendar"></span> Días</label>
                    <p id="view-days">---</p>
                </div>
                <div class="info-item">
                    <label><span class="icon-clock"></span> Horario</label>
                    <p id="view-time">---</p>
                </div>
                <div class="info-item">
                    <label><span class="icon-hour-glass"></span> Duración</label>
                    <p id="view-duration">---</p>
                </div>
                <div class="info-item">
                    <label><span class="icon-users"></span> Cupo Máximo</label>
                    <p id="view-capacity">---</p>
                </div>
                <div class="info-item">
                    <label><span class="icon-coin-dollar"></span> Costo de Inversión</label>
                    <p id="view-cost" class="cost-highlight">---</p>
                </div>
            </div>

            <div class="description-box">
                <label>Descripción</label>
                <p id="view-description">No hay descripción disponible para este curso.</p>
            </div>

            <div class="features-container">
                <div id="tag-evaluation" class="feature-tag">
                    <span class="icon-clipboard"></span> Evaluación
                </div>
                <div id="tag-certificate" class="feature-tag">
                    <span class="icon-certificate"></span> Certificado
                </div>
            </div>
        </div>

        <footer class="course-footer">
            <button class="btn btn-delete" onclick="eliminarCurso()">
                <span class="icon-bin"></span> Eliminar
            </button>
            <button class="btn btn-edit" onclick="editarCurso()">
                <span class="icon-pencil"></span> Editar Curso
            </button>
        </footer>
    </div>

    <script>
        // Simulamos la llegada de datos desde tu función DB.buscar()
        const cursoData = {
            Name: "Desarrollo de Aplicaciones Electron",
            Description: "Curso intensivo para crear aplicaciones de escritorio utilizando Node.js, HTML, CSS y SQLite.",
            Instructor_Name: "Ing. Duno Castellano", // Esto vendría de un JOIN con la tabla Instructor
            Days: "Lun, Mié, Vie",
            Start_Time: "14:00",
            End_Time: "16:00",
            Duration_Value: 8,
            Duration_Unit: "Semanas",
            Capacity: 20,
            Cost: "45.00",
            Has_Evaluation: 1,
            Has_Certificate: 1,
            Status: "Activo"
        };

        function renderCurso(data) {
            document.getElementById('view-name').innerText = data.Name;
            document.getElementById('view-status').innerText = data.Status;
            document.getElementById('view-instructor').innerText = data.Instructor_Name;
            document.getElementById('view-days').innerText = data.Days;
            document.getElementById('view-time').innerText = `${data.Start_Time} - ${data.End_Time}`;
            document.getElementById('view-duration').innerText = `${data.Duration_Value} ${data.Duration_Unit}`;
            document.getElementById('view-capacity').innerText = `${data.Capacity} Estudiantes`;
            document.getElementById('view-cost').innerText = `$${data.Cost}`;
            document.getElementById('view-description').innerText = data.Description;

            // Manejo de booleanos para las etiquetas
            if(data.Has_Evaluation) document.getElementById('tag-evaluation').classList.add('enabled');
            if(data.Has_Certificate) document.getElementById('tag-certificate').classList.add('enabled');
        }

        // Ejecutar render al cargar
        window.onload = () => renderCurso(cursoData);

        function editarCurso() { alert("Abriendo módulo de edición..."); }
        function eliminarCurso() { alert("Confirmar eliminación..."); }
    </script>
</body>
</html>
