<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Inscripción - Sistema Escolar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/icomoon/1.0.0/style.css">

    <style type="text/css">
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #2b56c5;
            --text-main: #374151;
            --text-muted: #9ca3af;
            --border-color: #d1d5db;
            --bg-light: #ffffff;
            --bg-disabled: #f3f4f6;
            --danger-red: #ef4444;
        }

        body {
        /* font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;*/
            color: var(--text-main);
        }

        /*--------ESTRUCTURA-----------------*/
.container-new-registre {
    display: grid;
    grid-template-columns: 1fr;
    grid-template-rows: 60px 1fr 70px;
    height: 100vh;
    /* padding: 20px; */
}
.container-title-register {
    display: flex;
    align-items: center;
    /* border-bottom: 1px solid var(--border-color); */
    /* margin-bottom: 15px; */
}
.container-registration-form {
    display: grid;
    grid-template-columns: 1fr 1fr;
    /* grid-gap: 20px; */
    /* overflow-y: auto; */
    padding: 3px;
    margin-left: 20px;
}



        .columns {
           /* padding: 10px;*/
        }

.action-footer {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    /* border-top: 1px solid var(--border-color); */
    /* padding-top: 10px; */
}

        /*--------------------STYLE TOGGLE SWITCH---------------*/
        .container-toogle-swicht {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .label-title {
            font-weight: bold;
            color: #333;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 70px;
            height: 30px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #d8d8d8;
            transition: .4s;
            border-radius: 34px;
        }

        .knob {
            position: absolute;
            height: 22px;
            width: 22px;
            left: 4px;
            top: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            font-weight: bold;
            color: #333;
        }

        input:checked + .slider {
            background-color: #60b8ff;
        }

        input:checked + .slider .knob {
            transform: translateX(40px);
        }

        /*----------------INPUT STYLE-------------------------*/
    .form-group {
    /* margin-bottom: 1rem; */
}

        .form-group > label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
        }

.form-group > input, .select-input-new-registre {
    width: 90%;
    padding: 10px;
    border: 1.5px solid var(--border-color);
    border-radius: 8px;
    font-size: 0.9rem;
    outline: none;
    transition: all 0.2s;
}
        .form-group > input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 5px rgba(43, 86, 197, 0.2);
        }

        /* Estado Deshabilitado */
        input:disabled, select:disabled {
            background-color: var(--bg-disabled);
            cursor: not-allowed;
            color: var(--text-muted);
        }

        /* Estilos de Subgrupos */
        .sub-group-data-personal, .container-tlf-email, .sub-container-representante-tlf-email {
            display: flex;
            gap: 10px;
        }

        .sub-group-data-personal > div, .container-tlf-email > div, .sub-container-representante-tlf-email > div {
            flex: 1;
        }

        /*-----------------IMAGE UPLOAD------------------------------*/
        .file-upload-container-new-registre {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

.image-uploader-register-studient {
    position: relative;
    width: 150px;
    height: 150px;
    cursor: pointer;
}

        .main-circle-register-studient {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #e5e7eb;
            overflow: hidden;
            border: 2px solid var(--border-color);
        }

.avatar-main-register {
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: blue;
}

.camera-button-register-studient {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 35px;
    height: 35px;
    background-color: #d7d7d7;
    border-radius: 50%;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    border: 2px solid white;
}

        /*-----------------BUTTON CONFIRM--------------------*/
        .btn-confirm {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-confirm:hover:not(:disabled) {
            filter: brightness(1.2);
        }

        .btn-confirm:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* Estilo Botón Limpiar */
.btn-clear {
    background-color: transparent;
    color: var(--text-main);
    border: 1.5px solid var(--border-color);
    padding: 12px 25px;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
    margin-right: 10px;
}
        .btn-clear:hover {
            background-color: #fceaea;
            border-color: var(--danger-red);
            color: var(--danger-red);
        }
    </style>
</head>
<body>

<div class="container-new-registre">
   
    <div class="container-title-register">
     
        <h1 class="titleRegister">Nueva Inscripción</h1>
    </div>

    <form class="container-registration-form" id="registrationForm">
        <div class="columns column1">
            <div class="form-group">
                <div class="container-toogle-swicht">
                    <label class="label-title">¿Es menor de edad?</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="ageToggle">
                        <div class="slider">
                            <div class="knob" id="text-toggle">No</div>
                        </div>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Ej: Rosa María Pérez Gonzales" required>
            </div>

            <div class="sub-group-data-personal">
                <div class="form-group">
                    <label>Cédula</label>
                    <input type="text" id="cedula" placeholder="Ej: 21783921" required>
                </div>
                <div class="form-group">
                    <label>Edad</label>
                    <input type="number" id="edad" placeholder="Ej: 20" required>
                </div>
                <div class="form-group">
                    <label>Nacimiento</label>
                    <input type="date" id="fechanacimiento" required>
                </div>
            </div>

            <div class="form-group">
                <label>Dirección</label>
                <input type="text" id="direccion" placeholder="Dirección completa" required>
            </div>

            <div class="sub-group-data-personal">
                <div class="form-group">
                    <label>Curso</label>
                    <select class="select-input-new-registre" id="tipoCurso" required>
                        <option value="" disabled selected>Selecciona...</option>
                        <option value="1">Curso de Programación</option>
                        <option value="2">Curso de Diseño</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Horario</label>
                    <select class="select-input-new-registre" id="tipoHorario" required>
                        <option value="" disabled selected>Selecciona...</option>
                        <option value="1">Diurno</option>
                        <option value="2">Vespertino</option>
                        <option value="3">Nocturno</option>
                    </select>
                </div>
            </div>

            <div class="container-tlf-email">
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="correo" placeholder="nombre@correo.com" required>
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="tel" id="telefono" placeholder="04163003485" required>
                </div>
            </div>
        </div>

        <div class="columns column2">
            <div class="file-upload-container-new-registre">
                <div class="image-uploader-register-studient">
                    <div class="main-circle-register-studient">
                        <img id="imagen-avatar" class="avatar-main-register" src="file:///C:/Users/Duno%20Castellano/Desktop/S.A.I.A/app/assets/imagen/ImageLogin3.png" alt="Avatar">
                    </div>
                    <div class="camera-button-register-studient">
                        <span class="icon-camera"></span>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Nombre del Representante</label>
                <input type="text" id="nombre_representante" class="rep-field" placeholder="Nombre completo" disabled>
            </div>

            <div class="form-group">
                <label>Cédula del Representante</label>
                <input type="text" id="cedula_representante" class="rep-field" placeholder="Cédula" disabled>
            </div>

            <div class="sub-container-representante-tlf-email">
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="tel" id="telefono_representante" class="rep-field" placeholder="Teléfono" disabled>
                </div>
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="correo_representante" class="rep-field" placeholder="correo@ejemplo.com" disabled>
                </div>
            </div>
        </div>
    </form>

    <div class="action-footer">
        <button type="button" class="btn-clear" id="btn-clear">Limpiar</button>
        <button type="submit" class="btn-confirm" id="btn-confirm" disabled>
            Confirmar <span class="icon-checkmark"></span>
        </button>
    </div>
</div>

<script type="text/javascript">
   const ageToggle = document.getElementById('ageToggle');
    const btnConfirm = document.getElementById('btn-confirm');
    const btnClear = document.getElementById('btn-clear');
    const textToggle = document.getElementById('text-toggle');
    const repFields = document.querySelectorAll('.rep-field');
    const allInputs = document.querySelectorAll('#registrationForm input, #registrationForm select');
    const registrationForm = document.getElementById('registrationForm');

    function validateForm() {
        let isFormValid = true;
        const studentRequiredIds = ['nombre', 'cedula', 'edad', 'fechanacimiento', 'direccion', 'tipoCurso', 'tipoHorario', 'correo', 'telefono'];
        
        studentRequiredIds.forEach(id => {
            const input = document.getElementById(id);
            if (!input.value.trim()) isFormValid = false;
        });

        if (ageToggle.checked) {
            repFields.forEach(field => {
                if (!field.value.trim()) isFormValid = false;
            });
        }
        btnConfirm.disabled = !isFormValid;
    }

    ageToggle.addEventListener('change', function() {
        const isMinor = this.checked;
        textToggle.innerHTML = isMinor ? 'Sí' : 'No';
        repFields.forEach(field => {
            field.disabled = !isMinor;
            if (!isMinor) field.value = "";
        });
        validateForm();
    });

    allInputs.forEach(input => {
        input.addEventListener('input', validateForm);
        input.addEventListener('change', validateForm);
    });

    // --- FUNCIÓN LIMPIAR ---
    btnClear.addEventListener('click', () => {

        /*------------------------------------------------*/
  let fecha = new Date();
  let formatofecha = fecha.getDate() + "/" + (fecha.getMonth() + 1) + "/" + fecha.getFullYear();
  /*--------------------------*/
  const ahora = new Date();
  const horaActual = ahora.getHours().toString().padStart(2, '0') + ':' +
                     ahora.getMinutes().toString().padStart(2, '0') + ':' +
                     ahora.getSeconds().toString().padStart(2, '0');

        /*------------------------------------------------*/
        // Resetea el formulario completo
        registrationForm.reset();
        
        // Resetea manualmente el estado del toggle y campos de representante
        ageToggle.checked = false;
        textToggle.innerHTML = 'No';
        repFields.forEach(field => {
            field.disabled = true;
            field.value = "";
        });

        // Vuelve a validar para desactivar el botón confirmar
        validateForm();
        console.log("Formulario limpiado");
    });

    btnConfirm.addEventListener('click', () => {
        const formData = {
            estudiante: {
                esMenor: ageToggle.checked,
                nombre: document.getElementById('nombre').value,
                cedula: document.getElementById('cedula').value,
                edad: document.getElementById('edad').value,
                nacimiento: document.getElementById('fechanacimiento').value,
                direccion: document.getElementById('direccion').value,
                curso: document.getElementById('tipoCurso').value,
                horario: document.getElementById('tipoHorario').value,
                correo: document.getElementById('correo').value,
                telefono: document.getElementById('telefono').value
            }
        };

        formData.DataRegistre={
            fecha:formatofecha,
            hora:horaActual
        }

        if (ageToggle.checked) {
            formData.representante = {
                nombre: document.getElementById('nombre_representante').value,
                cedula: document.getElementById('cedula_representante').value,
                telefono: document.getElementById('telefono_representante').value,
                correo: document.getElementById('correo_representante').value
            };
        } else {
            formData.representante = null;
        }

        console.log("Datos capturados:", formData);
        alert("Inscripción de " + formData.estudiante.nombre + " capturada.");
    });

    validateForm();

</script>

</body>
</html>
